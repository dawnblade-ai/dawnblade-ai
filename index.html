/* ---------- LOADOUT — official zones: 4 armor slots, 2 hands ---------- */
function slotOf(c){
  const t = ((c&&c.tt)||"").toLowerCase();
  if(/off[\s-]?hand/.test(t)) return {z:"off",h:1,lab:"off"};
  if(/\bquiver\b/.test(t)) return {z:"qvr",h:0,lab:"quiver"};
  if(/\b2h\b/.test(t)) return {z:"2h",h:2,lab:"2h"};
  if(/\b1h\b/.test(t)) return {z:"1h",h:1,lab:"1h"};
  if(/\bhead\b/.test(t)) return {z:"head",h:0,lab:"head"};
  if(/\bchest\b/.test(t)) return {z:"chest",h:0,lab:"chest"};
  if(/\barms\b/.test(t)) return {z:"arms",h:0,lab:"arms"};
  if(/\blegs\b/.test(t)) return {z:"legs",h:0,lab:"legs"};
  if(/weapon/.test(t) || (c&&c.power!=null)) return {z:"1h",h:1,lab:"1h?"};
  return {z:"misc",h:0,lab:"gear"};
}
const ARMOR_Z = ["head","chest","arms","legs"];
const HAND_Z = ["1h","2h","off","qvr"];
function applyPick(list, sel, i){
  const item = idx => list.find(x=>x.i===idx);
  if(sel.includes(i)){
    let out = sel.filter(x=>x!==i);
    if(item(i).s.z==="2h") out = out.filter(x=>item(x).s.z!=="qvr");
    return out;
  }
  const s = item(i).s;
  let out = sel.slice();
  if(ARMOR_Z.includes(s.z) || s.z==="misc"){
    if(ARMOR_Z.includes(s.z)) out = out.filter(x=>item(x).s.z!==s.z);
    const armorN = out.filter(x=>ARMOR_Z.includes(item(x).s.z)||item(x).s.z==="misc").length;
    if(armorN>=4) return sel;
    return [...out,i];
  }
  if(s.z==="qvr"){
    out = out.filter(x=>item(x).s.z!=="qvr");
    if(!out.some(x=>item(x).s.z==="2h")) return sel;
    return [...out,i];
  }
  if(s.z==="2h"){
    out = out.filter(x=>!["1h","off"].includes(item(x).s.z));
    return [...out,i];
  }
  out = out.filter(x=>item(x).s.z!=="2h" && item(x).s.z!=="qvr");
  if(s.z==="off") out = out.filter(x=>item(x).s.z!=="off");
  let hands = out.filter(x=>["1h","off"].includes(item(x).s.z));
  hands.sort((a,b)=>(item(a).s.z==="off"?0:1)-(item(b).s.z==="off"?0:1));
  while(hands.reduce((a,x)=>a+item(x).s.h,0) + s.h > 2){ out = out.filter(x=>x!==hands[0]); hands = hands.slice(1); }
  return [...out,i];
}
function defaultPicks(list){
  let sel = [];
  ARMOR_Z.forEach(z=>{
    const best = list.filter(x=>x.s.z===z).sort((a,b)=>(b.c.def||0)-(a.c.def||0))[0];
    if(best) sel = applyPick(list, sel, best.i);
  });
  const twoH = list.filter(x=>x.s.z==="2h").sort((a,b)=>(b.c.power||0)-(a.c.power||0))[0];
  if(twoH && twoH.c.power!=null){
    sel = applyPick(list, sel, twoH.i);
    const q = list.find(x=>x.s.z==="qvr"); if(q) sel = applyPick(list, sel, q.i);
  } else {
    list.filter(x=>x.s.z==="1h").sort((a,b)=>(b.c.power||0)-(a.c.power||0)).slice(0,2).forEach(x=>{ sel = applyPick(list, sel, x.i); });
    const off = list.filter(x=>x.s.z==="off").sort((a,b)=>(b.c.def||0)-(a.c.def||0))[0];
    if(off) sel = applyPick(list, sel, off.i);
  }
  return sel;
}
function Loadout({h,db,onBack,onStart}){
  const d = PARSED[h.k];
  const gearR = uM(()=>d.gear.map((e,i)=>{ const c=resolveEntry(db,e); return {i, c, s:slotOf(c)}; }),[h,db]);
  const handL = gearR.filter(x=>HAND_Z.includes(x.s.z));
  const armorL = gearR.filter(x=>!HAND_Z.includes(x.s.z));
  const saved = store.get("loadout."+h.k, null);
  const [sel,setSel] = uS(()=>{
    if(saved && saved.sel){ let s=[]; saved.sel.forEach(i=>{ if(gearR.some(x=>x.i===i)) s=applyPick(gearR,s,i); }); if(s.length) return s; }
    return defaultPicks(gearR);
  });
  const [cuts,setCuts] = uS(()=> (saved&&saved.cuts)||{});
  const [zoom,setZoom] = uS(null);
  const item = i => gearR.find(x=>x.i===i);
  const hands = sel.filter(i=>["1h","2h","off"].includes(item(i).s.z)).reduce((a,i)=>a+item(i).s.h,0);
  const armorN = sel.filter(i=>ARMOR_Z.includes(item(i).s.z)||item(i).s.z==="misc").length;
  const has2H = sel.some(i=>item(i).s.z==="2h");
  const deckTotal = d.deck.reduce((a,e)=>a+e.q,0);
  const cutN = Object.values(cuts).reduce((a,b)=>a+b,0);
  const size = deckTotal - cutN;
  const tapCut = (ei,q) => setCuts(c=>{
    const cur = c[ei]||0;
    if(cur<q && size>40) return {...c,[ei]:cur+1};
    const n={...c}; delete n[ei]; return n;
  });
  const start = () => { store.set("loadout."+h.k,{sel,cuts}); onStart({gearIdx:sel, cuts}); };
  const dg = DUMMY_GEAR.map(nm=>resolveEntry(db,{name:nm,p:0,code:null,q:1}));
  const deckRows = d.deck.map((e,ei)=>({ei, e, c:resolveEntry(db,e)}));
  const PD = {1:"var(--r)",2:"var(--y)",3:"var(--b)"};
  const Tile = ({x}) => {
    const on = sel.includes(x.i);
    const dead = x.s.z==="qvr" && !on && !has2H;
    return (
      <button className={"pick clip-sm"+(on?" on":"")+(dead?" lockout":"")} onClick={()=>{ if(dead){setZoom(x.c);return;} setSel(s=>applyPick(gearR,s,x.i)); }}>
        <CardImg card={x.c}/>
        <span className="slotb">{x.s.lab}</span>
        {on && <span className="chk">✓</span>}
      </button>);
  };
  return (
    <div className="lo">
      <button className="tag" onClick={onBack}>← back to select</button>
      <div className="heroplate clip-sm" style={{marginTop:8}}>
        <div className="hport"><HeroArt h={h} db={db}/></div>
        <div className="hinfo"><b>{h.n.split(",")[0]}</b><span className="hab">{h.cls} · Chapter {h.ch}{h.mystery?" · fate chose":""}</span></div>
      </div>
      <div className="sec">Scout the opponent</div>
      <div className="dgear" style={{padding:"8px 10px",background:"var(--forge)",border:"1px solid var(--line)"}}>
        <span className="lblg">The Dummy wears Ironrot — blocks hits ≥4, once each. Arcane slips past the iron.</span>
        {dg.map((x,i)=><button key={i} className="dg" onClick={()=>setZoom(x)}><CardImg card={x}/><span>{x.def!=null?x.def:1}</span></button>)}
      </div>
      <div className="sec">Hands <b>{hands} / 2</b> <span style={{textTransform:"none",letterSpacing:0}}>two 1H, or 1H + off-hand, or one 2H{gearR.some(x=>x.s.z==="qvr")?" (+ quiver on a 2H)":""}</span></div>
      <div className="pickgrid">
        {handL.map(x=><Tile key={x.i} x={x}/>)}
        {!handL.length && <span className="tag">no weapons — this hero fights with cards alone</span>}
      </div>
      <div className="sec">Armor <b>{armorN} / 4</b> <span style={{textTransform:"none",letterSpacing:0}}>one each: head · chest · arms · legs</span></div>
      <div className="pickgrid">
        {armorL.map(x=><Tile key={x.i} x={x}/>)}
      </div>
      <div className="sec">Trim the deck <b>{size}</b> <span style={{textTransform:"none",letterSpacing:0}}>(min 40 — tap to cut, tap through to restore)</span></div>
      <div className="cutlist">
        {deckRows.map(({ei,e,c})=>{
          const cut = cuts[ei]||0, kept = e.q-cut;
          return (
            <button key={ei} className={"cutrow clip-sm"+(cut>0?" cut":"")} onClick={()=>tapCut(ei,e.q)}>
              <span className="pd" style={{background:PD[c.pitch]||"var(--line)"}}/>
              <span className="nm2">{e.name}</span>
              <span className="qq">{cut>0?`${kept} of ${e.q}`:`×${e.q}`}</span>
            </button>);
        })}
      </div>
      <button className="battlebtn clip" style={{marginTop:14}} onClick={start}><span>Fight</span></button>
      <p className="note">One per armor zone, two hands, one off-hand, quivers perch on a 2H — per the official rules, read from each card. Blitz runs 40 exactly. Loadout saved per hero.</p>
      <CardModal card={zoom} onClose={()=>setZoom(null)}/>
    </div>
  );
}

/* ---------- APP ---------- */
function App(){
  const [db,reload] = useCardDB();
  const [tab,setTab]=uS("heroes");
  const [hero,setHero]=uS(null);
  const [fighting,setFighting]=uS(null);
  const [loHero,setLoHero]=uS(null);
  const [best,setBest]=uS(()=>store.get("best",{}));
  const record=(k,score)=>setBest(b=>{
    const nb={...b,[k]: b[k]==null?score:Math.min(b[k],score)}; store.set("best",nb); return nb;
  });
  return (
    <div className="shell">
      <div className="topbar">
        <span className="brand">DAWN<em>BLADE</em></span>
        <span className="tag">v{APP_VER}{db.status==="ready" ? " · "+db.count+" cards" : ""}</span>
      </div>
      <DbBanner db={db} reload={reload}/>
      {tab==="heroes" && !fighting && !loHero && <>
        <HeroGrid best={best} onPick={p=>setHero(p&&p.random ? {...HEROES[Math.floor(Math.random()*HEROES.length)], mystery:true} : p)} db={db} selected={hero}/>
        {hero && <button className="battlebtn clip" disabled={db.status!=="ready"} onClick={()=>setLoHero(hero)}><span>{db.status==="ready"?"Battle":"Forging…"}</span></button>}
        <VsStrip hero={hero} db={db}/>
        {hero && !hero.mystery && <HeroSheet h={hero} db={db} best={best} onBack={()=>setHero(null)} onFight={h=>setFighting(h)}/>}
        {hero && hero.mystery && <p className="note" style={{textAlign:"center"}}>Fate holds the card — your fighter is revealed at preparation.</p>}
      </>}
      {loHero && !fighting && <Loadout h={loHero} db={db} onBack={()=>setLoHero(null)} onStart={cfg=>{setFighting({h:loHero,cfg}); setLoHero(null);}}/>}
      {fighting && <Battle h={fighting.h} cfg={fighting.cfg} db={db} onExit={()=>setFighting(null)} onRecord={record}/>}
      {tab==="judge" && !fighting && !loHero && <Judge/>}
      {tab==="trophies" && !fighting && !loHero && <Trophies/>}
      {!fighting && !loHero && <nav className="tabs">
        <button className={"tab"+(tab==="heroes"?" on":"")} onClick={()=>{setTab("heroes");}}>Heroes</button>
        <button className={"tab"+(tab==="judge"?" on":"")} onClick={()=>setTab("judge")}>Judge</button>
        <button className={"tab"+(tab==="trophies"?" on":"")} onClick={()=>setTab("trophies")}>Trophies</button>
      </nav>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
setTimeout(function(){ if(!window.React || !document.querySelector(".shell")) document.getElementById("cdnfail").style.display="block"; },4000);
</script>
</body>
</html>
