<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>DAWNBLADE — Silver Age Training Hall</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800&family=Spline+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
:root{
  --r:#C4302B; --y:#E8B33C; --b:#3B6FB0;
  --ink:#14100E; --forge:#241B16; --forge2:#2E241D;
  --bone:#E8DFD0; --bone-dim:#B8AC98; --line:#4A3B2E;
  --ok:#7BA05B;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--ink);color:var(--bone);font-family:'Spline Sans',sans-serif;font-size:15px;line-height:1.45;overscroll-behavior:none}
#root{min-height:100%;display:flex;flex-direction:column}
h1,h2,h3,.disp{font-family:'Big Shoulders Display',sans-serif;letter-spacing:.02em;text-transform:uppercase}
.mono{font-family:'Spline Sans Mono',monospace}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
img{display:block;max-width:100%}
.clip{clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px))}
.clip-sm{clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px))}

/* shell */
.shell{flex:1;display:flex;flex-direction:column;max-width:560px;width:100%;margin:0 auto;padding:max(10px,env(safe-area-inset-top)) 12px calc(64px + env(safe-area-inset-bottom))}
.topbar{display:flex;align-items:baseline;justify-content:space-between;padding:6px 2px 10px}
.brand{font-family:'Big Shoulders Display';font-weight:800;font-size:22px;letter-spacing:.06em}
.brand em{font-style:normal;color:var(--y)}
.tag{font-size:10px;color:var(--bone-dim);text-transform:uppercase;letter-spacing:.14em}
.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;gap:2px;background:var(--ink);border-top:1px solid var(--line);padding:6px 6px calc(6px + env(safe-area-inset-bottom));z-index:40}
.tab{flex:1;max-width:132px;text-align:center;padding:9px 4px;font-family:'Big Shoulders Display';font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--bone-dim)}
.tab.on{color:var(--ink);background:var(--y)}
.tab.on.fight{background:var(--r);color:var(--bone)}

/* db banner */
.dbbar{display:flex;align-items:center;gap:8px;background:var(--forge);border:1px solid var(--line);padding:8px 10px;margin-bottom:10px;font-size:12px}
.dbbar .dot{width:8px;height:8px;flex:none;background:var(--y);animation:pulse 1.1s infinite alternate}
.dbbar.ok .dot{background:var(--ok);animation:none}
.dbbar.err .dot{background:var(--r);animation:none}
@keyframes pulse{to{opacity:.25}}
.dbbar .retry{margin-left:auto;color:var(--y);font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.08em}
.prog{height:3px;background:var(--forge2);margin-top:5px;width:100%}
.prog i{display:block;height:100%;background:var(--y);transition:width .3s}

/* hero select — full roster on one screen, smash-style */
.hgrid{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.hgrid .hcard{width:calc((100% - 20px)/6)}
.hcard{position:relative;background:var(--forge);border:1px solid var(--line);padding:0;overflow:hidden;display:flex;flex-direction:column}
.hcard img.art{width:100%;aspect-ratio:1/1;object-fit:cover;object-position:50% 16%;filter:saturate(.92)}
.hcard .fallbackart{aspect-ratio:1/1;font-size:12px}
.hcard .nm{display:block;padding:2px 3px;background:var(--forge2);border-top:1px solid var(--line);font-family:'Big Shoulders Display';font-weight:700;font-size:8.5px;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;margin-top:auto}
.hcard.ch1{box-shadow:inset 0 -2px 0 var(--r)}
.hcard.ch2{box-shadow:inset 0 -2px 0 var(--y)}
.hcard.ch3{box-shadow:inset 0 -2px 0 var(--b)}
.hcard .best{position:absolute;top:2px;right:2px;background:var(--ink);border:1px solid var(--y);color:var(--y);font-size:8px;padding:0 3px;font-family:'Spline Sans Mono'}
.openslot{border:1px dashed var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--bone-dim);background:transparent;min-height:64px}
.openslot b{font-family:'Big Shoulders Display';font-size:16px;font-weight:700;line-height:1}
.openslot span{font-size:7.5px;letter-spacing:.14em;text-transform:uppercase}
.roster-legend{display:flex;gap:12px;margin:8px 2px 2px;font-size:10px;color:var(--bone-dim);text-transform:uppercase;letter-spacing:.1em;align-items:center;flex-wrap:wrap}
.roster-legend i{width:8px;height:8px;display:inline-block;margin-right:4px}
.fallbackart{width:100%;aspect-ratio:5/7;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--forge2),var(--ink));font-family:'Big Shoulders Display';font-size:34px;font-weight:800;color:var(--line)}

/* hero sheet */
.sheet{background:var(--forge);border:1px solid var(--line);padding:14px;margin-top:12px}
.sheet h2{font-size:26px;font-weight:800}
.sheet .cls{color:var(--y);font-size:12px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.statrow{display:flex;gap:14px;margin:10px 0;font-family:'Spline Sans Mono';font-size:13px}
.statrow b{color:var(--y)}
.bigbtn{display:block;width:100%;padding:14px;background:var(--r);color:var(--bone);font-family:'Big Shoulders Display';font-weight:800;font-size:19px;letter-spacing:.1em;text-transform:uppercase;text-align:center;margin-top:12px}
.bigbtn.alt{background:var(--forge2);border:1px solid var(--line);color:var(--bone);font-size:15px;padding:11px}
.bigbtn:disabled{opacity:.4}

/* deck viewer */
.dsec{margin:14px 0 6px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--bone-dim)}
.dsec.p1{color:var(--r)}.dsec.p2{color:var(--y)}.dsec.p3{color:var(--b)}
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.cgrid .cc{position:relative;padding:0;background:var(--forge)}
.cgrid img{aspect-ratio:5/7;object-fit:cover;width:100%}
.cc .q{position:absolute;top:4px;left:4px;background:var(--ink);border:1px solid var(--line);font-family:'Spline Sans Mono';font-size:11px;padding:1px 5px}
.ccfall{aspect-ratio:5/7;display:flex;flex-direction:column;justify-content:space-between;padding:8px;border:1px solid var(--line);font-size:11px;line-height:1.25}
.ccfall .pn{font-family:'Big Shoulders Display';font-weight:700;font-size:13px}
.pb1{box-shadow:inset 0 -3px 0 var(--r)}.pb2{box-shadow:inset 0 -3px 0 var(--y)}.pb3{box-shadow:inset 0 -3px 0 var(--b)}

/* battle */
.board{display:flex;flex-direction:column;gap:10px}
.dummy{background:var(--forge);border:1px solid var(--line);padding:12px;display:flex;align-items:center;gap:12px}
.dummy .hp{font-family:'Big Shoulders Display';font-weight:800;font-size:40px;line-height:1;color:var(--r)}
.dummy .lbl{font-size:11px;color:var(--bone-dim);text-transform:uppercase;letter-spacing:.1em}
.dummy .incoming{margin-left:auto;text-align:right;font-family:'Spline Sans Mono';font-size:12px;color:var(--y)}
.mystat{display:flex;gap:8px;flex-wrap:wrap;font-family:'Spline Sans Mono';font-size:12px}
.pill{background:var(--forge);border:1px solid var(--line);padding:5px 9px}
.pill b{color:var(--y)}
.pill.hp b{color:var(--r)}
.log{background:var(--forge);border:1px solid var(--line);padding:9px 10px;font-size:12.5px;min-height:44px;color:var(--bone)}
.log .dim{color:var(--bone-dim)}
.zone{font-size:11px;color:var(--bone-dim);text-transform:uppercase;letter-spacing:.12em;margin:2px 2px 4px}
.hand{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.hand .hc{position:relative;padding:0;background:var(--forge);border:1px solid var(--line);transition:transform .12s}
.hand .hc img{aspect-ratio:5/7;object-fit:cover;width:100%}
.hand .hc.sel{transform:translateY(-6px);border-color:var(--y);box-shadow:0 0 0 1px var(--y)}
.hand .hc.dis{opacity:.45}
.hand .hc .cost{position:absolute;top:3px;left:3px;background:var(--ink);font-family:'Spline Sans Mono';font-size:11px;padding:1px 5px;border:1px solid var(--line)}
.hand .hc .pw{position:absolute;bottom:3px;left:3px;background:var(--ink);font-family:'Spline Sans Mono';font-size:11px;padding:1px 5px;border:1px solid var(--r);color:var(--r)}
.hand .hc .df{position:absolute;bottom:3px;right:3px;background:var(--ink);font-family:'Spline Sans Mono';font-size:11px;padding:1px 5px;border:1px solid var(--b);color:var(--b)}
.arsenalrow{display:flex;gap:8px;align-items:stretch}
.arsenalrow .slot{width:64px;flex:none;border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--bone-dim);text-transform:uppercase;letter-spacing:.08em;text-align:center;padding:4px}
.arsenalrow .slot img{aspect-ratio:5/7;object-fit:cover}
.gearrow{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.gearrow .g{flex:none;width:56px;position:relative;padding:0;background:var(--forge);border:1px solid var(--line)}
.gearrow .g img{aspect-ratio:5/7;object-fit:cover}
.gearrow .g.used{opacity:.35}
.gearrow .g .gd{position:absolute;bottom:2px;right:2px;background:var(--ink);font-family:'Spline Sans Mono';font-size:10px;padding:0 4px;border:1px solid var(--b);color:var(--b)}
.actrow{display:flex;gap:8px}
.actrow .a{flex:1;padding:12px 6px;font-family:'Big Shoulders Display';font-weight:800;font-size:16px;letter-spacing:.08em;text-transform:uppercase;background:var(--forge2);border:1px solid var(--line)}
.actrow .a.go{background:var(--r)}
.actrow .a.pay{background:var(--y);color:var(--ink)}
.actrow .a:disabled{opacity:.4}
.paymode{border:1px solid var(--y);background:rgba(232,179,60,.07);padding:8px 10px;font-size:12.5px}
.blockmode{border:1px solid var(--b);background:rgba(59,111,176,.08);padding:8px 10px;font-size:12.5px}

/* card modal */
.modal{position:fixed;inset:0;background:rgba(10,8,7,.82);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px}
.modal .inner{max-width:340px;width:100%}
.modal img{width:100%;border:1px solid var(--line)}
.modal .txt{background:var(--forge);border:1px solid var(--line);padding:10px;font-size:13px;margin-top:8px}
.modal .chip{display:inline-block;margin-top:8px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--bone-dim);border:1px solid var(--line);padding:2px 7px}

/* reveal + judge + misc */
.reveal{position:fixed;inset:0;background:rgba(10,8,7,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:70;text-align:center;padding:24px}
.reveal .card{width:200px;background:var(--forge);border:1px solid var(--y);padding:18px 14px;position:relative;overflow:hidden}
.reveal .card::before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,var(--r),var(--y),var(--b));transform:translateX(-101%);animation:bleed 1.1s .15s forwards}
@keyframes bleed{60%{transform:translateX(0)}100%{transform:translateX(101%)}}
.reveal h3{font-size:22px;position:relative}
.reveal .rar{font-size:11px;letter-spacing:.2em;color:var(--y);text-transform:uppercase;position:relative}
.qopt{display:block;width:100%;text-align:left;padding:11px 12px;background:var(--forge);border:1px solid var(--line);margin-top:8px;font-size:14px}
.qopt.right{border-color:var(--ok);color:var(--ok)}
.qopt.wrong{border-color:var(--r);color:var(--r)}
.explain{border-left:3px solid var(--y);padding:8px 10px;background:var(--forge);margin-top:10px;font-size:13px}
.note{font-size:11.5px;color:var(--bone-dim);margin-top:10px;line-height:1.5}
.note a{color:var(--y)}
.win{border:1px solid var(--ok);background:rgba(123,160,91,.08);padding:12px;text-align:center}
.lose{border:1px solid var(--r);background:rgba(196,48,43,.08);padding:12px;text-align:center}
.cdnfail{display:none;padding:40px 20px;text-align:center;font-family:sans-serif;color:#E8DFD0}

/* v5: effects engine UI */
.fxdot{position:absolute;top:4px;right:4px;width:9px;height:9px;border:1px solid var(--ink)}
.fxdot.full{background:var(--ok)}.fxdot.part{background:var(--y)}.fxdot.none{background:#6B6258}
.cov{margin:12px 0 4px;font-size:12px}
.covbar{height:6px;background:var(--forge2);display:flex;margin-top:4px}
.covbar i{height:100%}
.covbar .cf{background:var(--ok)}.covbar .cp{background:var(--y)}.covbar .cn{background:#6B6258}
.fxlist{margin-top:6px;font-size:12px;border-top:1px solid var(--line);padding-top:6px}
.fxlist .fc{display:flex;gap:6px;margin:3px 0;align-items:flex-start}
.fxlist .fs{flex:none;font-family:'Spline Sans Mono';font-size:10px;padding:0 4px;border:1px solid var(--line);margin-top:1px}
.fxlist .fs.run{color:var(--ok);border-color:var(--ok)}
.fxlist .fs.noop{color:var(--y);border-color:var(--y)}
.fxlist .fs.skip{color:var(--bone-dim)}
.boardrow{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.boardrow .b{flex:none;width:56px;position:relative;padding:0;background:var(--forge);border:1px solid var(--line)}
.boardrow .b img{aspect-ratio:5/7;object-fit:cover}
.boardrow .b .sw{position:absolute;bottom:0;left:0;right:0;background:var(--r);font-family:'Spline Sans Mono';font-size:10px;text-align:center;padding:1px 0}
.boardrow .b.spent{opacity:.4}
.tokpills{display:flex;gap:6px;flex-wrap:wrap;font-family:'Spline Sans Mono';font-size:11px}
.tokpills .tk{border:1px solid var(--y);color:var(--y);padding:2px 7px}
.tokpills .tk.bad{border-color:var(--r);color:var(--r)}

/* vs strip — P1 / P2 slots under the roster */
.hcard.sel{outline:2px solid var(--y);outline-offset:-1px;z-index:1}
.vs{display:flex;align-items:stretch;gap:8px;margin-top:10px}
.vslot{flex:1;background:var(--forge);border:1px solid var(--line);padding:14px 8px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;min-height:126px;position:relative;color:inherit}
.vslot.p1{box-shadow:inset 0 -3px 0 var(--r)}
.vslot.p2{box-shadow:inset 0 -3px 0 var(--b)}
.vslot.empty{border-style:dashed;justify-content:center;color:var(--bone-dim)}
.vslot .ptag{position:absolute;top:4px;left:6px;font-family:'Spline Sans Mono';font-size:9px;letter-spacing:.12em}
.vslot .port{width:62px}
.vslot img.art{width:100%;aspect-ratio:1/1;object-fit:cover;object-position:50% 16%}
.vslot .fallbackart{aspect-ratio:1/1;font-size:11px}
.vslot .vname{font-family:'Big Shoulders Display';font-weight:800;font-size:12px;letter-spacing:.05em;text-transform:uppercase;text-align:center}
.vslot .taunt{font-size:9px;color:var(--bone-dim);font-style:italic}
.vsmid{display:flex;align-items:center;font-family:'Big Shoulders Display';font-weight:800;font-size:24px;color:var(--y);padding:0 2px}
.dmy{display:flex;flex-direction:column;align-items:center;animation:sway 3.4s ease-in-out infinite;transform-origin:50% 100%}
.dmy[data-bonk]{animation:bonk .55s ease-out, sway 3.4s ease-in-out .55s infinite}
.dhead{width:36px;height:30px;border-radius:4px;background:linear-gradient(160deg,#8A7355,#6F5B42);border:1px solid var(--ink);display:flex;align-items:center;justify-content:center;gap:6px;font-family:'Spline Sans Mono';font-size:10px;color:var(--ink)}
.dbody{width:42px;height:16px;background:#5C4B37;border:1px solid var(--ink);border-top:none;clip-path:polygon(8% 0,92% 0,100% 100%,0 100%)}
.dpost{width:7px;height:13px;background:var(--forge2);border:1px solid var(--line)}
@keyframes sway{0%,100%{transform:rotate(-1.6deg)}50%{transform:rotate(2.2deg)}}
@keyframes bonk{0%{transform:rotate(0)}30%{transform:rotate(15deg)}60%{transform:rotate(-9deg)}100%{transform:rotate(0)}}

/* battle strip — appears when P1 is locked in */
.battlebtn{display:block;width:100%;margin-top:10px;padding:11px 8px;background:linear-gradient(180deg,#D43A34,var(--r) 55%,#9E2722);color:var(--bone);font-family:'Big Shoulders Display';font-weight:800;font-size:30px;letter-spacing:.24em;text-transform:uppercase;text-align:center;position:relative;overflow:hidden;text-shadow:0 2px 0 rgba(20,16,14,.35)}
.battlebtn::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(135deg,rgba(20,16,14,.14) 0 10px,transparent 10px 22px)}
.battlebtn::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(232,223,208,.28) 50%,transparent 70%);transform:translateX(-120%);animation:bsweep 2.6s ease-in-out infinite}
@keyframes bsweep{0%{transform:translateX(-120%)}55%,100%{transform:translateX(120%)}}
.battlebtn:disabled{filter:grayscale(.65) brightness(.7)}
.battlebtn span{position:relative;z-index:1}

/* match narration ticker + claude's call */
.ticker{position:sticky;top:0;z-index:35;background:rgba(20,16,14,.97);border:1px solid var(--line);border-left:3px solid var(--r);padding:7px 10px;display:flex;gap:9px;align-items:flex-start;min-height:42px}
.ticker .live{flex:none;display:flex;align-items:center;gap:4px;font-family:'Spline Sans Mono';font-size:9px;color:var(--r);letter-spacing:.14em;padding-top:2px}
.ticker .dot{width:6px;height:6px;border-radius:50%;background:var(--r);animation:pulse 1s infinite alternate}
.ticker .cap{font-size:12.5px;line-height:1.35;animation:capin .25s ease-out}
.ticker .more{margin-left:auto;flex:none;font-family:'Spline Sans Mono';font-size:9px;color:var(--bone-dim);border:1px solid var(--line);padding:1px 4px}
@keyframes capin{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.adv{border:1px solid var(--y);background:rgba(232,179,60,.06)}
.advhead{width:100%;text-align:left;padding:7px 10px;font-family:'Spline Sans Mono';font-size:10px;letter-spacing:.14em;color:var(--y);text-transform:uppercase}
.advbody{padding:0 10px 9px;font-size:13px}
.advwhy{font-size:11px;color:var(--bone-dim);margin-top:3px;line-height:1.4}

/* hero plate, combat chain, damage pops, sticky actions */
.heroplate{display:flex;gap:8px;align-items:center;background:var(--forge);border:1px solid var(--line);padding:6px 8px}
.heroplate .hport{width:40px;flex:none;padding:0}
.heroplate img.art{width:100%;aspect-ratio:1/1;object-fit:cover;object-position:50% 16%}
.heroplate .fallbackart{aspect-ratio:1/1;font-size:10px}
.heroplate .hinfo{flex:1;min-width:0}
.heroplate .hinfo b{font-family:'Big Shoulders Display';font-size:14px;letter-spacing:.04em;text-transform:uppercase}
.heroplate .hab{display:block;font-size:10px;color:var(--bone-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.heroplate .hlife{text-align:right;font-family:'Spline Sans Mono';flex:none}
.heroplate .hlife span{font-size:8px;color:var(--bone-dim);letter-spacing:.1em}
.heroplate .hlife b{display:block;font-size:22px;line-height:1;color:var(--r);font-family:'Big Shoulders Display'}
.heroplate .hact{flex:none;background:var(--y);color:var(--ink);font-family:'Big Shoulders Display';font-weight:800;font-size:12px;letter-spacing:.06em;padding:8px 9px}
.heroplate .hact:disabled{opacity:.35}
.chainwrap{margin-top:-2px}
.chain{display:flex;gap:7px;overflow-x:auto;align-items:center;padding:2px 0 4px}
.clink{position:relative;flex:none;width:34px}
.clink img,.clink .ct{width:100%;aspect-ratio:5/7;object-fit:cover;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:'Big Shoulders Display';font-size:14px;color:var(--bone-dim);background:var(--forge)}
.clink b{position:absolute;bottom:-2px;right:-3px;background:var(--ink);border:1px solid var(--r);color:var(--r);font-family:'Spline Sans Mono';font-size:10px;padding:0 3px;font-weight:400}
.clink.arc b{border-color:var(--b);color:var(--b)}
.clink i{position:absolute;top:-2px;right:-3px;background:var(--ink);border:1px solid var(--y);color:var(--y);font-style:normal;font-size:9px;padding:0 2px}
.clink.foe img,.clink.foe .ct{border-color:var(--r)}
.clink:not(:last-child)::after{content:"";position:absolute;right:-5px;top:50%;width:4px;height:2px;background:var(--line)}
.dummy{position:relative}
.dmgpop{position:absolute;top:8px;right:10px;font-family:'Big Shoulders Display';font-weight:800;font-size:24px;color:var(--r);animation:dpop .9s ease-out forwards;pointer-events:none}
@keyframes dpop{0%{opacity:0;transform:translateY(6px)}15%{opacity:1}100%{opacity:0;transform:translateY(-20px)}}
.actrow{position:sticky;bottom:calc(6px + env(safe-area-inset-bottom));z-index:28}
.actrow .a{box-shadow:0 -4px 14px rgba(10,8,7,.55)}

/* loadout + dummy gear + equipment abilities */
.dummy{flex-direction:column;align-items:stretch;gap:8px}
.drow{display:flex;align-items:center;gap:12px}
.dgear{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.dgear .lblg{font-size:9px;color:var(--bone-dim);text-transform:uppercase;letter-spacing:.08em;margin-right:2px}
.dg{width:30px;flex:none;position:relative;padding:0;border:1px solid var(--r);background:var(--forge)}
.dg img{aspect-ratio:5/7;object-fit:cover}
.dg span{position:absolute;bottom:-2px;right:-2px;background:var(--ink);border:1px solid var(--b);color:var(--b);font-family:'Spline Sans Mono';font-size:9px;padding:0 2px}
.dg.used{opacity:.35;filter:grayscale(1)}
.gp{position:absolute;top:2px;left:2px;background:var(--ink);border:1px solid var(--y);color:var(--y);font-size:9px;padding:0 2px}
.lo .sec{margin:14px 0 6px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--bone-dim);display:flex;align-items:baseline;gap:8px}
.lo .sec b{color:var(--y);font-family:'Spline Sans Mono';font-size:11px}
.pickgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.pick{position:relative;padding:0;border:1px solid var(--line);background:var(--forge)}
.pick img{aspect-ratio:5/7;object-fit:cover;width:100%}
.pick.on{outline:2px solid var(--y);outline-offset:-1px}
.pick .chk{position:absolute;top:2px;right:2px;background:var(--y);color:var(--ink);font-size:10px;font-weight:700;padding:0 4px}
.pick.lock{border-color:var(--r)}
.pick .wtag{position:absolute;bottom:0;left:0;right:0;background:rgba(158,39,34,.92);font-size:8px;letter-spacing:.1em;text-transform:uppercase;text-align:center;padding:1px 0}
.cutlist{display:flex;flex-direction:column;gap:3px}
.cutrow{display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--forge);border:1px solid var(--line);font-size:12.5px;text-align:left}
.cutrow .pd{width:8px;height:8px;flex:none}
.cutrow .qq{margin-left:auto;font-family:'Spline Sans Mono';font-size:11px;color:var(--bone-dim)}
.cutrow.cut{opacity:.5}
.cutrow.cut .nm2{text-decoration:line-through}

.slotb{position:absolute;bottom:0;left:0;right:0;background:rgba(20,16,14,.88);border-top:1px solid var(--line);font-size:8px;letter-spacing:.1em;text-transform:uppercase;text-align:center;padding:1px 0;color:var(--bone-dim)}
.pick.on .slotb{color:var(--y)}
.pick.lockout{opacity:.35}

/* the stack — priority windows */
.stackv{border:1px solid var(--b);background:rgba(59,111,176,.07);padding:8px 10px}
.stackv .sh{font-family:'Spline Sans Mono';font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--b);display:flex;justify-content:space-between;margin-bottom:5px}
.slayer{display:flex;align-items:center;gap:7px;padding:5px 8px;border:1px solid var(--line);background:var(--forge);margin-top:4px;font-size:12.5px}
.slayer.top{border-color:var(--y)}
.slayer .sk{flex:none;font-family:'Spline Sans Mono';font-size:9px;letter-spacing:.1em;padding:0 4px;border:1px solid var(--line);color:var(--bone-dim)}
.slayer.atk .sk{border-color:var(--r);color:var(--r)}
.slayer.def .sk{border-color:var(--b);color:var(--b)}
.slayer.rx .sk{border-color:var(--y);color:var(--y)}

/* card frame overlay — real FaB corner order */
.cfw{position:relative;width:100%}
.b-pit,.b-cost,.b-atk,.b-def{position:absolute;font-family:'Spline Sans Mono';font-weight:700;font-size:12px;line-height:1;padding:2px 5px;color:#FFF;background:rgba(16,12,10,.92);border:1px solid var(--line)}
.b-pit{top:2px;left:2px;border:none}
.b-pit.p1{background:var(--r)}
.b-pit.p2{background:var(--y);color:var(--ink)}
.b-pit.p3{background:var(--b)}
.b-cost{top:2px;right:2px;border-color:#E8DFD0}
.b-atk{bottom:2px;left:2px;border-color:var(--r)}
.b-def{bottom:2px;right:2px;border-color:var(--b)}
.b-typ{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-size:7px;letter-spacing:.07em;text-transform:uppercase;background:rgba(16,12,10,.9);color:var(--bone-dim);padding:1px 4px;border:1px solid var(--line);white-space:nowrap;pointer-events:none}
.cfw.sm .b-pit,.cfw.sm .b-cost,.cfw.sm .b-atk,.cfw.sm .b-def{font-size:9px;padding:1px 3px}
.cfw.sm .b-typ{font-size:6px;padding:0 3px}
.hand{gap:5px}
.gearrow .g{width:62px}
.boardrow .b{width:62px}
.dg{width:40px}

.hcard.rand .fallbackart{aspect-ratio:1/1;font-size:26px;color:var(--y)}
.hcard.rand{box-shadow:inset 0 -2px 0 var(--y)}
.shell{padding-left:8px;padding-right:8px}
.board{gap:8px}
.dummy{padding:10px}
.heroplate{padding:5px 7px}
.ticker{min-height:38px}
.hand{gap:4px}
.gearrow .g{width:64px}
.boardrow .b{width:64px}

/* tabletop — 3 vertical flick screens, each with a horizontal swipe pane */
.tablewrap{height:63vh;overflow-y:auto;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;margin-top:4px;border:1px solid var(--line)}
.vscreen{scroll-snap-align:start;scroll-snap-stop:always;height:63vh;min-height:63vh;display:flex;flex-direction:column;overflow:hidden;background:var(--ink)}
.vscreen .hscroll{flex:1;display:flex;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.hpane{flex:0 0 100%;max-width:100%;overflow-y:auto;padding:6px 8px 10px;box-sizing:border-box}
.screennav{display:flex;gap:5px;margin:6px 0 0}
.screennav button{flex:1;padding:6px 0;font-family:'Spline Sans Mono';font-size:9px;letter-spacing:.12em;text-transform:uppercase;background:var(--forge2);border:1px solid var(--line);color:var(--bone-dim)}
.paneflag{text-align:center;font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--bone-dim);padding:0 0 6px;display:flex;justify-content:space-between}
.modehint{font-size:10px;color:var(--y);text-align:center;padding:3px 0 6px;letter-spacing:.05em;text-transform:uppercase}
.gyrow{display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start}
.gyrow .gyc{width:46px;flex:none}
.gyempty{font-size:12px;color:var(--bone-dim);font-style:italic;padding:10px 4px}
.histturn{margin-bottom:10px}
.histturn .htlabel{font-size:10px;color:var(--bone-dim);margin-bottom:3px;font-family:'Spline Sans Mono';letter-spacing:.08em;text-transform:uppercase}
.zstrip{background:var(--forge);border:1px solid var(--line);padding:6px 8px;margin-top:6px}
.zlbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--bone-dim);margin-bottom:4px}
.zrow{display:flex;align-items:center;gap:6px;margin:4px 0}
.zk{font-family:'Spline Sans Mono';font-size:10px;color:var(--bone-dim);flex:none;width:50px}
.zthumbs{display:flex;gap:4px;overflow-x:auto;flex:1}
.mini{width:26px;flex:none}
.mini img,.mini .ct{width:100%;aspect-ratio:5/7;object-fit:cover;border:1px solid var(--line);background:var(--forge)}
.zpitch{display:flex;gap:5px}
.zpchip{font-family:'Spline Sans Mono';font-size:10px;border:1px solid var(--line);padding:0 4px}
.zempty{font-size:11.5px;color:var(--bone-dim);font-style:italic}

<script type="text/babel" data-presets="env,react">
const {useState,useEffect,useMemo,useCallback} = React;

/* ---------- storage ---------- */
const store = {
  get(k,f){ try{const v=localStorage.getItem("dawnblade."+k); return v==null?f:JSON.parse(v);}catch(e){return f;} },
  set(k,v){ try{localStorage.setItem("dawnblade."+k, JSON.stringify(v));}catch(e){} }
};

/* ---------- helpers ---------- */
const norm = s => s.toLowerCase().replace(/[^a-z0-9]+/g," ").trim();
const cdnImg = code => code ? (CDN + code + ".webp") : null;
const toNum = v => { const n = parseInt(v,10); return isNaN(n) ? null : n; };
const PITCH_NAME = {1:"red",2:"yellow",3:"blue"};

function parseDeck(raw){
  const gear=[], deck=[]; let hero=null;
  raw.trim().split("\n").forEach(line=>{
    const [a,name,p,code] = line.split("|");
    const e = {name:name.trim(), p:parseInt(p,10)||0, code:(code||"").trim()||null};
    if(a==="H") hero=e; else if(a==="G") gear.push(e); else { e.q=parseInt(a,10)||1; deck.push(e); }
  });
  return {hero,gear,deck};
}
const PARSED = {}; HEROES.forEach(h=>{ PARSED[h.k]=parseDeck(DECKS[h.k]); });

/* every card name we need from the database */
const NEEDED = new Set();
Object.values(PARSED).forEach(d=>{
  NEEDED.add(norm(d.hero.name));
  d.gear.forEach(e=>NEEDED.add(norm(e.name)));
  d.deck.forEach(e=>{ NEEDED.add(norm(e.name)); if(e.name.includes("//")) NEEDED.add(norm(e.name.split("//")[0])); });
});

/* print codes + hero name stems for robust DB matching */
const CODES = new Set();
Object.values(PARSED).forEach(d=>{ [d.hero].concat(d.gear,d.deck).forEach(e=>{ if(e.code) CODES.add(e.code); }); });
const HERO_STEMS = HEROES.map(h=>norm(PARSED[h.k].hero.name));
DUMMY_GEAR.forEach(nm=>NEEDED.add(norm(nm)));

/* ---------- card database (the-fab-cube, open data) ---------- */
function useCardDB(){
  const [state,setState] = useState({status:"idle",pct:0,byNP:{},byName:{},byCode:{},count:0,err:null});
  const load = useCallback(async(force)=>{
    setState(s=>({...s,status:"loading",pct:0,err:null}));
    try{
      let cards = null;
      if(!force){
        const cached = store.get("dbcache_"+DATA_VER, null);
        if(cached && Array.isArray(cached)) cards = cached;
      }
      if(!cards){
        const res = await fetch(DBSRC);
        if(!res.ok) throw new Error("HTTP "+res.status);
        const total = +res.headers.get("content-length") || 0;
        let text;
        if(res.body && total){
          const reader = res.body.getReader(); const chunks=[]; let got=0;
          for(;;){ const {done,value}=await reader.read(); if(done)break;
            chunks.push(value); got+=value.length;
            setState(s=>({...s,pct:Math.min(99,Math.round(got/total*100))})); }
          const buf=new Uint8Array(got); let o=0; chunks.forEach(c=>{buf.set(c,o);o+=c.length;});
          text = new TextDecoder().decode(buf);
        } else { text = await res.text(); }
        const all = JSON.parse(text);
        cards = [];
        all.forEach(c=>{
          if(!c || !c.name) return;
          const nm = norm(c.name);
          const isTok = /token/i.test(c.type_text||"") || /token/i.test((c.types||[]).join(" "));
          const prints={};
          (c.printings||[]).forEach(pr=>{
            const id = pr.id || pr.identifier || pr.set_printing_unique_id || null;
            const url = pr.image_url || pr.image || null;
            if(url){ if(id) prints[id]=url; if(!prints._first) prints._first=url; }
          });
          const isHero = /hero/i.test(c.type_text||"") && HERO_STEMS.some(st=>nm.includes(st));
          const hasCode = Object.keys(prints).some(id=>id!=="_first" && CODES.has(id));
          if(!NEEDED.has(nm) && !isTok && !isHero && !hasCode) return;
          cards.push({
            n:c.name, p:toNum(c.pitch), c:toNum(c.cost), pw:toNum(c.power),
            d:toNum(c.defense), hp:toNum(c.health), int:toNum(c.intelligence),
            tt:c.type_text||((c.types||[]).join(" ")), kw:(c.card_keywords||[]).concat(c.granted_keywords||[]),
            tx:c.functional_text_plain||c.functional_text||"", pr:prints
          });
        });
        store.set("dbcache_"+DATA_VER, cards);
      }
      const byNP={}, byName={}, byCode={};
      cards.forEach(c=>{
        const k=norm(c.n);
        byNP[k+"|"+(c.p==null?0:c.p)]=c;
        (byName[k]=byName[k]||[]).push(c);
        Object.keys(c.pr||{}).forEach(id=>{ if(id!=="_first") byCode[id]=c; });
      });
      setState({status:"ready",pct:100,byNP,byName,byCode,count:cards.length,err:null});
    }catch(e){ setState(s=>({...s,status:"error",err:String(e&&e.message||e)})); }
  },[]);
  useEffect(()=>{ load(false); },[load]);
  return [state,load];
}

function resolveEntry(db, e){
  const k = norm(e.name);
  let cands = db.byName[k];
  if(!cands && e.name.includes("//")) cands = db.byName[norm(e.name.split("//")[0])];
  let card = null;
  if(!cands && e.code && db.byCode && db.byCode[e.code]) cands = [db.byCode[e.code]];
  if(cands){
    if(e.p>0) card = cands.find(c=>c.p===e.p) || null;
    if(!card && e.code) card = cands.find(c=>c.pr[e.code]) || null;
    if(!card) card = cands.slice().sort((a,b)=>(a.p??9)-(b.p??9))[0];
  }
  const img = cdnImg(e.code) || (card ? (card.pr[e.code]||card.pr._first) : null);
  const dbImg = card ? (card.pr._first||null) : null;
  return {
    name:e.name, q:e.q||1, code:e.code,
    pitch: card&&card.p!=null ? card.p : (e.p||0),
    cost: card?card.c:null, power: card?card.pw:null, def: card?card.d:null,
    tt: card?card.tt:"", kw: card?card.kw:[], tx: card?card.tx:"",
    img, dbImg, resolved: !!card
  };
}
function resolveHero(db, e){
  if(!db || db.status!=="ready") return null;
  const k = norm(e.name);
  let c = (db.byName[k]||[])[0] || null;
  if(!c && e.code && db.byCode) c = db.byCode[e.code] || null;
  if(!c){
    let best=null;
    Object.keys(db.byName).forEach(nm=>{
      if(!nm.includes(k)) return;
      db.byName[nm].forEach(x=>{
        if(!/hero/i.test(x.tt||"")) return;
        if(best==null || (x.hp!=null?x.hp:99) < (best.hp!=null?best.hp:99)) best=x;
      });
    });
    c = best;
  }
  return c;
}
const isAttack = c => /attack/i.test(c.tt) && /action/i.test(c.tt) && c.power!=null;
const isArrow  = c => /arrow/i.test(c.tt);
const isWeapon = c => /weapon/i.test(c.tt) && c.power!=null;
const hasGA = c => (c.kw||[]).some(k=>/go again/i.test(k)) || /\bgo again\b/i.test(c.tx||"");
const arcaneDmg = c => { const m=(c.tx||"").match(/deals? (\d+) arcane damage/i); return m?+m[1]:null; };

/* ---------- shared UI ---------- */
function CardImg({card, className}){
  const [stage,setStage] = useState(0); // 0 primary, 1 db, 2 fallback
  const src = stage===0 ? card.img : stage===1 ? card.dbImg : null;
  if(src) return <img className={className} src={src} loading="lazy" alt={card.name}
    onError={()=>setStage(s=> s===0 && card.dbImg && card.dbImg!==card.img ? 1 : 2)}/>;
  return (
    <div className={"ccfall pb"+(card.pitch||1)}>
      <div className="pn">{card.name}</div>
      <div className="mono">{card.cost!=null?("cost "+card.cost):""} {card.power!=null?(" · "+card.power+"⚔"):""} {card.def!=null?(" · "+card.def+"🛡"):""}</div>
    </div>
  );
}
function CardModal({card,onClose}){
  if(!card) return null;
  return (
    <div className="modal" onClick={onClose}>
      <div className="inner" onClick={e=>e.stopPropagation()}>
        <CardImg card={card}/>
        <div className="txt">
          <b>{card.name}</b>{card.pitch?<span className="mono"> · pitch {card.pitch} ({PITCH_NAME[card.pitch]})</span>:null}
          <div className="mono" style={{margin:"4px 0"}}>{card.tt}</div>
          {card.tx ? <div>{card.tx}</div> : <div className="dim">Stats loaded; rules text pending database.</div>}
          <FxChip card={card}/>
        </div>
        <button className="bigbtn alt" onClick={onClose}>Close</button>
      </div>
    </div>
  );
}
function DbBanner({db,reload}){
  if(db.status==="ready") return null;
  if(db.status==="error") return (
    <div className="dbbar err"><span className="dot"/><span>Database fetch failed: {db.err}. Art still loads; stats need the DB.</span>
      <button className="retry" onClick={()=>reload(true)}>Retry</button></div>
  );
  return (
    <div className="dbbar"><span className="dot"/>
      <span style={{flex:1}}>Forging card database — first visit only<div className="prog"><i style={{width:db.pct+"%"}}/></div></span>
    </div>
  );
}

/* ---------- hero select + deck view ---------- */
function HeroGrid({onPick,best,db,selected}){
  return (
    <div>
      <div className="hgrid">
        {HEROES.map(h=>(
          <button key={h.k} className={"hcard clip-sm ch"+h.ch+(selected&&!selected.mystery&&selected.k===h.k?" sel":"")} onClick={()=>onPick(h)}>
            <HeroArt h={h} db={db} key={db.status}/>
            {best[h.k]!=null && <span className="best">★{best[h.k]}</span>}
            <span className="nm">{h.n.split(",")[0]}</span>
          </button>
        ))}
        <button className={"hcard rand clip-sm"+(selected&&selected.mystery?" sel":"")} onClick={()=>onPick({random:true})}>
          <div className="fallbackart">?</div>
          <span className="nm">Random</span>
        </button>
      </div>
      <div className="roster-legend">
        <span><i style={{background:"var(--r)"}}/>Chapter 1</span>
        <span><i style={{background:"var(--y)"}}/>Chapter 2</span>
        <span><i style={{background:"var(--b)"}}/>Chapter 3</span>
        <span style={{marginLeft:"auto"}}>15 fighters · fate optional</span>
      </div>
    </div>
  );
}
const TAUNTS=["hit me.","still undefeated.","creaks menacingly.","zero fear detected.","42 and holding.","your move, hero."];
function VsStrip({hero,db}){
  const [t,setT]=useState(()=>Math.floor(Math.random()*TAUNTS.length));
  const [bonk,setBonk]=useState(0);
  return (
    <div className="vs">
      <div className={"vslot p1 clip-sm"+(hero?"":" empty")}>
        <span className="ptag" style={{color:"var(--r)"}}>P1</span>
        {hero
          ? (hero.mystery
            ? <><div className="port clip-sm"><div className="fallbackart" style={{aspectRatio:"1/1",fontSize:26,color:"var(--y)"}}>?</div></div><span className="vname">???</span></>
            : <><div className="port clip-sm"><HeroArt h={hero} db={db} key={db.status}/></div><span className="vname">{hero.n.split(",")[0]}</span></>)
          : <span style={{fontSize:11,textAlign:"center"}}>choose your fighter</span>}
      </div>
      <div className="vsmid">VS</div>
      <button className="vslot p2 clip-sm" onClick={()=>{setBonk(b=>b+1);setT(x=>(x+1)%TAUNTS.length);}}>
        <span className="ptag" style={{color:"var(--b)"}}>P2</span>
        <div className="dmy" key={bonk} data-bonk={bonk>0?"1":undefined}>
          <div className="dhead"><span>✕</span><span>✕</span></div>

function HeroArt({h,db}){
  const [stage,setStage]=useState(0);
  const hc = db && db.status==="ready" ? resolveHero(db, PARSED[h.k].hero) : null;
  const dbImg = hc && hc.pr ? hc.pr._first : null;
  const src = stage===0 ? cdnImg(h.code) : stage===1 ? dbImg : null;
  if(src) return <img className="art" src={src} loading="lazy" alt={h.n}
    onError={()=>setStage(s=> s===0 && dbImg ? 1 : 2)}/>;
  return <div className="fallbackart">{h.n.split(/[ ,]/)[0]}</div>;
}
function HeroSheet({h,db,onBack,onFight,best}){
  const d = PARSED[h.k];
  const hc = resolveHero(db, d.hero);
  const hHP = hc&&hc.hp!=null ? hc.hp : 20;
  const hINT = hc&&hc.int!=null ? hc.int : 4;
  const [view,setView]=useState(false);
  const [zoom,setZoom]=useState(null);
  return (
    <div>
      <button className="tag" onClick={onBack}>✕ clear fighter</button>
      <div className="sheet clip">
        <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
          <div style={{width:92,flex:"none"}} className="clip-sm"><HeroArt h={h} db={db} key={db.status}/></div>
          <div>
            <h2>{h.n}</h2>
            <div className="cls">{h.cls} · Chapter {h.ch} · Silver Age precon</div>
            <p style={{fontSize:13.5}}>{h.blurb}</p>
          </div>
        </div>
        <div className="statrow">
          <span>LIFE <b>{hHP}</b></span><span>INTELLECT <b>{hINT}</b></span>
          <span>DECK <b>{d.deck.reduce((a,e)=>a+e.q,0)}</b></span><span>GEAR <b>{d.gear.length}</b></span>
          {best[h.k]!=null && <span>BEST <b>{best[h.k]}</b></span>}
        </div>
        <button className="bigbtn alt" onClick={()=>setView(v=>!v)}>{view?"Hide official 55":"View official 55"}</button>
      </div>
      {view && <DeckView h={h} db={db} onZoom={setZoom}/>}
      <CardModal card={zoom} onClose={()=>setZoom(null)}/>
      <p className="note">Decklist as published by Legend Story Studios for the Silver Age {h.n} precon. Card images © LSS, served from their public card CDN. This is an unofficial fan trainer, not affiliated with LSS.</p>
    </div>
  );
}
function DeckView({h,db,onZoom}){
  const d = PARSED[h.k];
  const ready = db.status==="ready";
  const R = e => ready ? resolveEntry(db,e) : {name:e.name,q:e.q||1,pitch:e.p,img:cdnImg(e.code),dbImg:null,tt:"",tx:"",kw:[]};
  const gear = [Object.assign({},d.hero,{q:1})].concat(d.gear).map(R);
  const secs = [[1,"Pitch 1 — Red"],[2,"Pitch 2 — Yellow"],[3,"Pitch 3 — Blue"]];
  const byPitch = p => d.deck.map(R).filter(c=>c.pitch===p);
  const other = d.deck.map(R).filter(c=>!c.pitch||c.pitch<1||c.pitch>3);
  const missing = ready ? d.deck.concat(d.gear).map(R).filter(c=>!c.resolved).map(c=>c.name) : [];
  const Grid = ({cards}) => (
    <div className="cgrid">{cards.map((c,i)=>(
      <button key={i} className="cc clip-sm" onClick={()=>onZoom(c)}>
        <CardImg card={c}/><span className="q">{c.q}×</span><FxDot card={c}/>
      </button>))}
    </div>
  );
  return (
    <div>
      <div className="dsec">Hero · Weapons · Equipment</div><Grid cards={gear}/>
      {secs.map(([p,label])=> byPitch(p).length ? <div key={p}><div className={"dsec p"+p}>{label}</div><Grid cards={byPitch(p)}/></div> : null)}
      {other.length ? <div><div className="dsec">Awaiting pitch data</div><Grid cards={other}/></div> : null}
      {ready && <FxCoverage cards={d.deck.map(R).concat(gear)}/>}
      {missing.length ? <p className="note">Not yet in the open card DB (stats pending): {[...new Set(missing)].join(", ")}.</p> : null}
    </div>
  );
}

<script type="text/babel" data-presets="env,react">
const {useState:uS,useMemo:uM,useEffect:uE,useRef:uR} = React;
const shuffle = a => { const x=a.slice(); for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];} return x; };

/* ============================================================
   FX — card effects interpreter.
   Every executed effect is parsed from the card's own rules
   text loaded at runtime. Unparsed clauses are never guessed:
   they are shown, labeled, and counted against coverage.
   ============================================================ */
const NWORD = {a:1,an:1,one:1,two:2,three:3,four:4};
const num = w => NWORD[w] || parseInt(w,10) || 1;
const clean = t => (t||"").replace(/\*\*?/g,"").replace(/\s+/g," ").trim();

function classifyClause(raw){
  const c = clean(raw).toLowerCase().replace(/\.$/,"");
  if(!c) return null;
  const R = (ops,extra) => Object.assign({status:"run",ops},extra||{});
  const NOOP = why => ({status:"noop",ops:[["noop",why]]});
  let m;
  if(m=c.match(/^(?:if|when) ([^,:]+)[,:] ?(.+)$/)){
    const cond=m[1], rest=classifyClause(m[2]);
    if(!rest || rest.status!=="run") return null;
    if(/hits?$|hit$|this hits/.test(cond)) return Object.assign(rest,{onHit:true});
    if(/another attack action card this turn/.test(cond)) return Object.assign(rest,{cond:"atk"});
    if(/another non-attack action card this turn/.test(cond)) return Object.assign(rest,{cond:"non"});
    return null;
  }
  if(/^go again$/.test(c)) return R([["ga"]]);
  if(/^(dominate|intimidate)$/.test(c)) return NOOP("no defender to restrict — training dummy");
  if(m=c.match(/^ward (\d+)/)) return R([["ward",+m[1]]]);
  if(m=c.match(/prevent (?:the next )?(\d+) (?:point(?:s)? of )?(arcane )?damage/)) return m[2] ? R([["awd",+m[1]]]) : R([["ward",+m[1]]]);
  if(m=c.match(/deals? (\d+) arcane damage/)) return R([["arcane",+m[1]]]);
  if(m=c.match(/draw (a|an|one|two|three|\d+) cards?/)) return R([["draw",num(m[1])]]);
  if(m=c.match(/gains? (\d+) (?:\{r\}|resource)/)) return R([["res",+m[1]]]);
  if(m=c.match(/gains? (\d+) (?:\{h\}|life)/)) return R([["life",+m[1]]]);
  if(m=c.match(/your next attack[^+]*\+(\d+)/)) return R([["buffNext",+m[1]]]);
  if(m=c.match(/(?:^|this attack |it )(?:gains?|gets?) \+(\d+)\s*(?:\{p\}|power)/)) return R([["self",+m[1]]]);
  if(m=c.match(/\bamp (\d+)/)) return R([["amp",+m[1]]]);
  if(m=c.match(/create (a|an|\d+|one|two|three) runechants?/)) return R([["rune",num(m[1])]]);
  if(/create .*frostbite/.test(c)) return NOOP("frostbite — dummy pays no costs");
  if(/(create|give).*bloodrot/.test(c)) return R([["rot",1]],{approx:true});
  if(/(create|give).*frailty/.test(c)) return R([["fra",1]],{approx:true});
  if(/inertia/.test(c)) return NOOP("inertia — dummy has no action phase");
  return null;
}

const FXMEMO = new Map();
function fxParse(card){
  const key = norm(card.name)+"|"+(card.pitch||0);
  if(FXMEMO.has(key)) return FXMEMO.get(key);
  const tt = (card.tt||"").toLowerCase();
  const kw = (card.kw||[]).map(k=>String(k).toLowerCase());
  const fx = {ga:kw.some(k=>k==="go again"), self:0, ops:[], onHit:[], conds:[], clauses:[], perm:null, dr:/defense reaction/.test(tt), approx:false};
  if(/\bally\b/.test(tt)) fx.perm="ally";
  else if(/\bitem\b/.test(tt)) fx.perm="item";
  else if(/\baura\b/.test(tt)) fx.perm="aura";
  else if(/\btrap\b/.test(tt)) fx.perm="trap";
  const clauses = clean(card.tx).split(/\.\s+|\n+/).map(s=>s.trim()).filter(Boolean);
  clauses.forEach(raw=>{
    const r = classifyClause(raw);
    if(!r){ fx.clauses.push({t:raw,st:"skip"}); return; }
    fx.clauses.push({t:raw, st:r.status});
    if(r.approx) fx.approx = true;
    r.ops.forEach(op=>{
      if(op[0]==="ga" && !r.cond && !r.onHit){ fx.ga=true; return; }
      if(op[0]==="self" && !r.cond && !r.onHit){ fx.self+=op[1]; return; }
      if(r.onHit) fx.onHit.push(op);
      else if(r.cond) fx.conds.push({cond:r.cond, op});
      else fx.ops.push(op);
    });
  });
  const runs = fx.clauses.filter(x=>x.st!=="skip").length;
  fx.tier = fx.clauses.length===0 ? "full" : runs===fx.clauses.length ? "full" : runs>0 ? "part" : "none";
  fx.playable = fx.ops.length>0 || fx.onHit.length>0 || fx.conds.length>0 || !!fx.perm || fx.ga;
  FXMEMO.set(key,fx);
  return fx;
}
function parseHeroPower(tx, allowDestroy){
  const t = clean(tx);
  const m = t.match(/(once per turn )?(action|instant)\s*[-—]*\s*([^:]{0,40}?):\s*([^.]+)/i);
  if(!m) return null;
  const costStr = (m[3]||"").trim();
  const sd = allowDestroy && /\bdestroy\b/i.test(costStr);
  if(!sd && /(discard|banish|remove|destroy|sacrifice|put |reveal|soul|life|\{h\})/i.test(costStr)) return null;
  if(sd && /(discard|banish|remove|sacrifice|put |reveal|soul|life|\{h\})/i.test(costStr)) return null;
  const dm = costStr.match(/(\d+)/);
  const rsym = (costStr.match(/\{r\}/gi)||[]).length;
  const cost = dm ? +dm[1] : rsym;
  const eff = classifyClause(m[4]);
  if(!eff || eff.status!=="run" || eff.cond || eff.onHit) return null;
  const after = t.slice(m.index + m[0].length);
  const ga = /^\.?\s*go again/i.test(after);
  return {cost, ga, sd:!!sd, eff:m[4].trim(),
    label:(sd?"destroy: ":(m[1]?"once/turn: ":""))+m[4].trim()+(cost?" ["+cost+"r]":"")+(ga?" · go again":"")};
}
const gearDef = gr => gr.destroyed ? 0 : (gr.curDef!=null ? gr.curDef : (gr.def||0));
function gearBlockApply(gr){
  const kws = (gr.kw||[]).map(k=>String(k).toLowerCase());
  const d = gearDef(gr); const n = {...gr};
  if(kws.some(k=>k.includes("blade break"))) n.destroyed = true;
  else if(kws.some(k=>k.includes("temper"))){ n.curDef = Math.max(0,d-1); if(n.curDef===0) n.destroyed = true; }
  else if(kws.some(k=>k.includes("battleworn"))){ n.curDef = Math.max(0,d-1); }
  return n;
}
const isAR = c => /attack reaction/i.test(c.tt||"");
const isInstantT = c => /\binstant\b/i.test(c.tt||"") && !/reaction/i.test(c.tt||"");
function FxDot({card}){ const t=fxParse(card).tier; return <span className={"fxdot "+t} title={"effects: "+t}/>; }
function FxChip({card}){
  const fx = fxParse(card);
  const label = {full:"fully scripted", part:"partially scripted", none:"text only — not executed"}[fx.tier];
  return (
    <div>
      <span className="chip">{label}{fx.approx?" · approx":""}{card.tt&&/defense reaction/i.test(card.tt)?" · blocks from hand":""}</span>
      {fx.clauses.length>0 &&
        <div className="fxlist">{fx.clauses.map((cl,i)=>(
          <div key={i} className="fc"><span className={"fs "+cl.st}>{cl.st==="run"?"▶":cl.st==="noop"?"○":"—"}</span><span>{cl.t}</span></div>
        ))}</div>}
    </div>
  );
}
function FxCoverage({cards}){
  const n = {full:0,part:0,none:0};
  cards.forEach(c=>{ n[fxParse(c).tier] += (c.q||1); });
  const tot = n.full+n.part+n.none || 1;
  return (
    <div className="cov">
      <b>Effects engine coverage:</b> {n.full} scripted · {n.part} partial · {n.none} text-only
      <div className="covbar">
        <i className="cf" style={{width:(n.full/tot*100)+"%"}}/>
        <i className="cp" style={{width:(n.part/tot*100)+"%"}}/>
        <i className="cn" style={{width:(n.none/tot*100)+"%"}}/>
      </div>
    </div>
  );
}

/* ---------- ADVISOR — pure move evaluation ---------- */
function advPitchPotential(hand, excl){ return hand.reduce((a,c,i)=> i===excl ? a : a+(c.pitch||0), 0); }
function advCardOut(c, g, ctx){
  const fx = fxParse(c);
  let dmg = 0;
  if(isAttack(c)){
    dmg = (c.power||0) + (fx.self||0) + g.buffNext + g.rune*ctx.runeDmg;
    fx.conds.forEach(cd=>{ if(cd.op[0]==="self" && ((cd.cond==="atk"&&g.hist.atk>0)||(cd.cond==="non"&&g.hist.non>0))) dmg += cd.op[1]; });
    if((ctx.dBlk||0)>0 && dmg>=4) dmg = Math.max(0, dmg-(ctx.dDef||1));
  }
  fx.ops.concat(isAttack(c)?fx.onHit:[]).forEach(op=>{ if(op[0]==="arcane") dmg += op[1] + g.amp; });
  return dmg;
}
function advValue(c, g, ctx){
  const fx = fxParse(c);
  let v = advCardOut(c,g,ctx);
  fx.ops.concat(isAttack(c)?fx.onHit:[]).forEach(op=>{
    if(op[0]==="draw") v += 1.6*op[1];
    else if(op[0]==="res") v += op[1];
    else if(op[0]==="rune") v += ctx.runeDmg*op[1]*0.9;
    else if(op[0]==="buffNext") v += op[1]*0.6;
    else if(op[0]==="life") v += op[1]*0.4;
    else if(op[0]==="ward") v += op[1]*0.4;
    else if(op[0]==="awd") v += op[1]*0.1;
    else if(op[0]==="amp") v += op[1]*0.7;
    else if(op[0]==="rot") v += 2;
  });
  if(fx.perm==="ally") v += (c.power||0)*1.5;
  return v - (c.cost||0)*0.15;
}
function advBestPitch(hand, need, exclIdx, valueOf){
  if(need<=0) return {idxs:[],gain:0,waste:0,loss:0};
  const n = hand.length; let best=null;
  for(let m=1;m<(1<<n);m++){
    if(exclIdx!=null && (m>>exclIdx&1)) continue;
    let gain=0, loss=0, idxs=[];
    for(let i=0;i<n;i++) if(m>>i&1){ gain+=hand[i].pitch||0; loss+=valueOf(hand[i]); idxs.push(i); }
    if(gain<need) continue;
    const waste = gain-need;
    if(!best || waste<best.waste || (waste===best.waste && loss<best.loss) || (waste===best.waste && loss===best.loss && idxs.length<best.idxs.length))
      best = {idxs,gain,waste,loss};
  }
  return best;
}
function advise(g, ctx){
  const V = c => advValue(c,g,ctx);
  const PV = c => (isAttack(c)&&isArrow(c)) ? V(c)*0.3 : V(c);
  const nm = c => c.name;
  if(g.mode==="pay" && g.pending){
    const need = (g.pending.card.cost||0)-g.res;
    const set = advBestPitch(g.hand, need, g.pending.from==="hand"?g.pending.idx:null, PV);
    if(!set) return {line:"Cancel — you can't cover this cost.", why:"Not enough pitch in hand. Pick a cheaper line."};
    const names = set.idxs.map(i=>nm(g.hand[i])).join(" + ");
    return {line:`Pitch ${names} — exactly ${set.gain}${set.waste?` (${set.waste} floats: spend it before end of turn)`:""}.`,
            why:"Fodder first — feed the fire with the cards you'd least like to swing."};
  }
  if(g.mode==="stack"){
    const rx = g.hand.map(c=>({c,fx:fxParse(c)})).filter(x=>(isAR(x.c)||(isInstantT(x.c)&&x.fx.ops.length>0)) && (x.c.cost||0)<=g.res)
      .map(x=>({...x,p:(x.fx.self||0)+x.fx.ops.filter(o=>o[0]==="buffNext").reduce((a,o)=>a+o[1],0)}))
      .sort((a,b)=>b.p-a.p)[0];
    if(rx && rx.p>0) return {line:`React with ${rx.c.name} (+${rx.p}), then pass.`, why:"Reactions land before the iron — every point punches through."};
    return {line:"Pass — let it resolve.", why:"No profitable reaction in hand; keep your cards for the swing back."};
  }
  if(g.mode==="arsenal"){
    const arrows = g.hand.map((c,i)=>({c,i})).filter(x=>isAttack(x.c)&&isArrow(x.c));
    if(arrows.length){ const b=arrows.sort((a,z)=>V(z.c)-V(a.c))[0]; return {line:`Arsenal ${nm(b.c)} — arrows only fire from there.`, why:"Ranger law: the arsenal is your bowstring."}; }
    if(!g.hand.length) return {line:"Skip — nothing to stash.", why:""};
    const b = g.hand.map((c,i)=>({c,i})).sort((a,z)=>V(z.c)-V(a.c))[0];
    return {line:`Arsenal ${nm(b.c)} — it swings again tomorrow.`, why:"Bank your best card; you'll draw back to full anyway."};
  }
  if(g.mode==="block"){
    const inc = g.incoming, hp = g.myHP;
    const atkEsts = g.hand.filter(isAttack).map(c=>advCardOut(c,g,ctx)).sort((a,b)=>b-a);
    const est = Math.max(3, ((atkEsts[0]||0)+(atkEsts[1]||0)) / (atkEsts.length>1?1.4:1));
    const myTTK = Math.max(1, Math.ceil(g.dHP/Math.max(3,est)));
    const dTTK = Math.max(1, Math.ceil(hp/4.2));
    const target = hp<=8 ? 0 : hp<=14 ? 1 : 2;
    const cards = g.hand.map((c,i)=>({t:"h",i,d:c.def||0,v:V(c),n:nm(c)})).filter(x=>x.d>0).sort((a,b)=>(a.v-b.v)||(b.d-a.d));
    const gearB = g.gear.map((c,i)=>({t:"g",i,d:c.def||0,used:c.used,n:nm(c)})).filter(x=>x.d>0&&!x.used);
    const pool = hp<=14 ? gearB.concat(cards) : cards.concat(gearB);
    let sum=0, picks=[];
    for(const p of pool){ if(inc-sum<=target) break; picks.push(p); sum+=p.d; }
    if(inc-sum>target && sum===0) picks=[], sum=0;
    if(!picks.length) return {line:`Take the ${inc} on the chin.`, why:`Race math: you fell the dummy in ~${myTTK} turns; it needs ~${dTTK} to fell you. Cards hit harder than they block.`};
    return {line:`Block with ${picks.map(p=>p.n).join(" + ")} (${sum}) — take ${Math.max(0,inc-sum)}.`,
            why: hp<=8 ? "You're deep in the red — armor up, survive the round." : `Race math: ~${myTTK} turns to kill, ~${dTTK} to die. Shed the cheap defense, keep the damage.`};
  }
  // act mode
  if(g.ap<1) return {line:"End turn — action point spent.", why:"Set your arsenal on the way out and draw back up."};
  const cands=[];
  g.hand.forEach((c,i)=>{
    const fx=fxParse(c); const atk=isAttack(c);
    if(atk&&isArrow(c)) return;
    if(!atk&&!fx.playable) return;
    if((c.cost||0) > g.res + advPitchPotential(g.hand,i)) return;
    cands.push({c,from:"hand",idx:i,excl:i});
  });
  if(g.arsenal && (isAttack(g.arsenal)||fxParse(g.arsenal).playable) && (g.arsenal.cost||0)<=g.res+advPitchPotential(g.hand,null))
    cands.push({c:g.arsenal,from:"arsenal",idx:0,excl:null});
  g.gear.forEach((w,i)=>{ if(isWeapon(w)&&!g.weaponUsed[w.uid]&&(w.cost||0)<=g.res+advPitchPotential(g.hand,null)) cands.push({c:w,from:"weapon",idx:i,excl:null}); });
  if(ctx.hpow && !g.weaponUsed["hpow"] && (ctx.hpow.cost||0)<=g.res+advPitchPotential(g.hand,null))
    cands.push({c:ctx.hpow,from:"hero",idx:0,excl:null});
  g.board.forEach((b,i)=>{ if(b.kind==="ally"&&!b.spent&&b.card.power>0) cands.push({c:b.card,from:"ally",idx:i,excl:null,free:true}); });
  if(!cands.length){
    return {line: g.res>0 ? `End turn — but ${g.res} will fizzle. If anything costs ≤${g.res}, squeeze it in.` : "End turn. Nothing profitable left — don't force it.",
            why:"Wasted resources scar your score; empty swings scar your hand."};
  }
  let best=null;
  cands.forEach(cd=>{
    const fx=fxParse(cd.c);
    const need=Math.max(0,(cd.c.cost||0)-g.res);
    const set = need>0 ? advBestPitch(g.hand,need,cd.excl,PV) : {idxs:[],gain:0,waste:0,loss:0};
    if(!set) return;
    let v = advValue(cd.c,g,ctx);
    if(fx.ga){
      const rest = g.hand.filter((c,i)=> i!==cd.idx || cd.from!=="hand").filter(c=>!set.idxs.includes(g.hand.indexOf(c)));
      const next = rest.filter(c=>(isAttack(c)&&!isArrow(c)) || fxParse(c).ops.concat(fxParse(c).onHit).some(o=>o[0]==="arcane"))
        .map(c=>advCardOut(c,g,ctx)).sort((a,b)=>b-a)[0]||0;
      v += 0.9 + next*0.5;
      cd.next = next;
    }
    if(cd.free) v += 0.5;
    v -= 0.55*set.loss + 0.9*set.waste;
    cd.v=v; cd.set=set;
    if(!best || v>best.v) best=cd;
  });
  if(!best || best.v < 0.4) return {line:"End turn — save the hand for blocks and tomorrow.", why:"Every play from here trades down."};
  const fx=fxParse(best.c);
  const out = advCardOut(best.c,g,ctx);
  const pitchTxt = best.set.idxs.length ? ` (pitch ${best.set.idxs.map(i=>nm(g.hand[i])).join(" + ")})` : "";
  const srcTxt = best.from==="arsenal" ? " from arsenal" : best.from==="hero" ? " — hero power" : best.from==="weapon" ? " — weapon swing" : best.from==="ally" ? " — send the ally in" : "";
  const bits=[]; if(out>0) bits.push(out+" dmg"); if(fx.ga) bits.push("go again");
  fx.ops.forEach(op=>{ if(op[0]==="draw") bits.push("draw "+op[1]); if(op[0]==="rune") bits.push("+"+op[1]+" runechant"); if(op[0]==="amp") bits.push("amp "+op[1]); });
  const why = fx.ga ? `Chain it: go again keeps your action point${best.next?` — ${Math.round(best.next)} more damage is waiting behind it`:""}.`
    : g.rune>0 && isAttack(best.c) ? `Your ${g.rune} runechant${g.rune>1?"s":""} pop on this swing — cash them in.`
    : out>=5 ? "Biggest clean hit on the table; anything smaller wastes the turn."
    : "Best value line available right now.";
  return {line:`Play ${nm(best.c)}${srcTxt}${pitchTxt} → ${bits.join(", ")||"effect"}.`, why};
}

function ChainLink({l}){
  const [err,setErr]=uS(false);
  const s = !err ? (l.img||l.dbImg) : null;
  return (
    <div className={"clink "+l.kind}>
      {s ? <img src={s} loading="lazy" alt={l.n} onError={()=>setErr(true)}/> : <span className="ct">{l.n[0]}</span>}
      <b>{l.dmg}</b>
      {l.ga && <i>↻</i>}
    </div>
  );
}
function typeAbbr(c){
  const t = (c.tt||"").toLowerCase();
  if(/attack reaction/.test(t)) return "React";
  if(/defense reaction/.test(t)) return "D-React";
  if(/\binstant\b/.test(t)) return "Instant";
  if(/\bally\b/.test(t)) return "Ally";
  if(/\bitem\b/.test(t)) return "Item";
  if(/\baura\b/.test(t)) return "Aura";
  if(/\btrap\b/.test(t)) return "Trap";
  if(/\bhero\b/.test(t)) return "Hero";
  if(/weapon|off[\s-]?hand|\b[12]h\b/.test(t)) return slotOf(c).lab.toUpperCase();
  if(/attack/.test(t) && /action/.test(t)) return "Attack";
  if(/equipment/.test(t)) return "Block";
  if(/action/.test(t)) return "Non-attack";
  return "";
}
function CardFrame({card,className,noType}){
  const t = noType ? "" : typeAbbr(card);
  return (
    <div className={"cfw"+(className?" "+className:"")}>
      <CardImg card={card}/>
      {card.pitch>=1 && card.pitch<=3 && <span className={"b-pit p"+card.pitch}>{card.pitch}</span>}
      {card.cost!=null && <span className="b-cost">{card.cost}</span>}
      {card.power!=null && <span className="b-atk">{card.power}</span>}
      {card.def!=null && <span className="b-def">{card.def}</span>}
      {t && <span className="b-typ">{t}</span>}
    </div>
  );
}
function Ticker({feed}){
  const [idx,setIdx]=uS(0);
  uE(()=>{
    if(idx>=feed.length-1) return;
    const backlog = feed.length-1-idx;
    const t=setTimeout(()=>setIdx(i=>i+1), backlog>2?1200:1900);
    return ()=>clearTimeout(t);
  },[idx,feed.length]);
  const shown = feed[Math.min(idx,feed.length-1)]||"";
  const backlog = Math.max(0,feed.length-1-idx);
  return (
    <div className="ticker">
      <span className="live"><span className="dot"/>LIVE</span>
      <span className="cap" key={idx}>{shown}</span>
      {backlog>1 && <span className="more">+{backlog}</span>}
    </div>
  );
}
function Advisor({g,ctx,read}){
  const [open,setOpen]=uS(()=>store.get("adv",true));
  const rec = uM(()=>{ try{return advise(g,ctx);}catch(e){return {line:"(advisor hiccup)",why:String(e)};} },[g]);
  if(g.over) return null;
  return (
    <div className="adv clip-sm">
      <button className="advhead" onClick={()=>setOpen(o=>{store.set("adv",!o);return !o;})}>✦ Claude's call {open?"▾":"▸"}</button>
      {open && <div className="advbody">
        <div>{rec.line}</div>
        {rec.why ? <div className="advwhy">{rec.why}</div> : null}
        {g.turn===1 && g.hist.atk===0 && g.hist.non===0 && read ? <div className="advwhy">{read}</div> : null}
      </div>}
    </div>
  );
}

/* ---------- BATTLE (v5: effects live) ---------- */
function ZoneStrip({label,none,hand,arsenal,pitch}){
  if(none) return <div className="zstrip"><div className="zlbl">{label}</div><div className="zempty">{none}</div></div>;
  const PD = {1:"var(--r)",2:"var(--y)",3:"var(--b)"};
  return (
    <div className="zstrip">
      <div className="zlbl">{label}</div>
      <div className="zrow"><span className="zk">Hand {hand.length}</span>
        <div className="zthumbs">{hand.map((c,i)=><div key={i} className="mini"><CardImg card={c}/></div>)}</div>
      </div>
      <div className="zrow"><span className="zk">Arsenal</span>
        {arsenal ? <div className="mini"><CardImg card={arsenal}/></div> : <span className="zempty">empty</span>}
      </div>
      <div className="zrow"><span className="zk">Pitch {pitch.length}</span>
        <div className="zpitch">{[1,2,3].map(p=><span key={p} className="zpchip" style={{borderColor:PD[p],color:PD[p]}}>{p}:{pitch.filter(c=>c.pitch===p).length}</span>)}</div>
      </div>
    </div>

}
function Battle({h,cfg,db,onExit,onRecord}){
  const oppRef=uR(null), chainRef=uR(null), youRef=uR(null);
  const jump = r => r.current && r.current.scrollIntoView({behavior:"smooth",block:"start"});
  const built = uM(()=>{
    const d = PARSED[h.k];
    const heroRec = resolveHero(db, d.hero) || {};
    const heroPow = heroRec.tx ? parseHeroPower(heroRec.tx) : null;
    const HPOW = heroPow ? {name:d.hero.name.split(",")[0]+" — hero power", pitch:0, cost:heroPow.cost, power:null, def:null,
      tt:"Hero Ability", kw:heroPow.ga?["Go again"]:[], tx:heroPow.eff, img:null, dbImg:null, uid:"hpow"} : null;
    const HZOOM = {name:d.hero.name, pitch:0, cost:null, power:null, def:null, tt:heroRec.tt||"Hero", kw:[],
      tx:heroRec.tx||"", img:cdnImg(d.hero.code), dbImg:heroRec.pr?heroRec.pr._first:null};
    const runeTok = (db.byName["runechant"]||[])[0];
    const runeDmg = runeTok && (clean(runeTok.tx).toLowerCase().match(/deal (\d+) arcane damage/)||[])[1];
    let uid=0;
    const cuts = (cfg&&cfg.cuts)||{};
    const deck = shuffle(d.deck.flatMap((e,ei)=>{
      const q = Math.max(0, e.q - (cuts[ei]||0));
      if(!q) return [];
      const c = resolveEntry(db,e);
      return Array.from({length:q},()=>({...c,uid:++uid}));
    }));
    const gearAll = d.gear.map((e,gi)=>({...resolveEntry(db,e),gi,uid:++uid,used:false}));
    const gear = (cfg&&cfg.gearIdx) ? gearAll.filter(x=>cfg.gearIdx.includes(x.gi)) : gearAll;
    gear.forEach(gr=>{ if(!isWeapon(gr) && gr.tx){ const pw=parseHeroPower(gr.tx, true);
      if(pw){ gr.pow=pw; gr.powCard={name:gr.name+" — ability",pitch:0,cost:pw.cost,power:null,def:null,
        tt:"Equipment Ability",kw:pw.ga?["Go again"]:[],tx:pw.eff,sd:pw.sd,img:null,dbImg:null,uid:"gp"+gr.uid}; } } });
    const dGear = DUMMY_GEAR.map(nm=>({...resolveEntry(db,{name:nm,p:0,code:null,q:1}),uid:++uid,used:false}));
    const _atk = deck.filter(isAttack);
    const _ga = deck.filter(c=>fxParse(c).ga).length;
    const _arc = deck.filter(c=>fxParse(c).ops.concat(fxParse(c).onHit).some(o=>o[0]==="arcane")).length;
    const _blue = deck.filter(c=>c.pitch===3).length;
    const _perm = deck.filter(c=>fxParse(c).perm).length;
    const _avg = _atk.length ? _atk.reduce((a,c)=>a+(c.power||0),0)/_atk.length : 0;
    const read = "Claude's read: "+_atk.length+" attacks avg "+_avg.toFixed(1)+" power, "+_ga+" go-again, "+_blue+" blue fuel"
      +(_arc?", "+_arc+" arcane":"")+(_perm?", "+_perm+" permanents":"")+". Chain go again into your heaviest hit; let nothing fizzle."+(heroPow?" Hero power online — "+heroPow.label+".":"");
    return {deck,gear,dGear,read,heroPow,HPOW,HZOOM,heroRec,myHP:heroRec.hp!=null?heroRec.hp:20,myInt:heroRec.int!=null?heroRec.int:4,runeDmg:runeDmg?+runeDmg:1,runeApprox:!runeTok};
  },[h,db]);

  const [g,setG] = uS(()=>({
    deck:built.deck.slice(built.myInt), hand:built.deck.slice(0,built.myInt),
    arsenal:null, pitch:[], grave:[], gear:built.gear, board:[],
    res:0, ap:1, turn:1, wasted:0, dHP:42, myHP:built.myHP, myInt:built.myInt,
    buffNext:0, amp:0, ward:0, awd:0, rune:0, rot:0, fra:0, hist:{atk:0,non:0},
    weaponUsed:{}, mode:"act", pending:null, paySel:[], incoming:0, blockH:[], blockG:[],
    log:["The dummy creaks to life. 42 to carve away — go."],
    feed:["Tonight in the hall: "+h.n+" versus the Dummy.", built.read, "The dummy creaks to life. 42 to carve away — go."],
    dGear:built.dGear, stack:[], pend:null, blockRx:[], chain:[], chainHist:[], hitSeq:0, lastDmg:0, flags:{}, over:null, inspect:false
  }));
  const [zoom,setZoom]=uS(null);
  const L = (s,msg)=>({...s, log:[msg, ...s.log].slice(0,4), feed:[...(s.feed||[]), msg]});
  const winCheck = s => {
    let n = s;
    if(n.dHP<=15 && n.dHP>0 && !n.flags.d15) n = L({...n, flags:{...n.flags, d15:true}}, "The dummy is wobbling — you can smell the sawdust.");
    if(n.dHP<=0 && !n.over) n = L({...n, over:{win:true, score:n.turn+n.wasted}}, `Dummy down on turn ${n.turn}. Score ${n.turn+n.wasted} (turns + wasted).`);
    return n;
  };

  const runOps = (s, ops, srcName) => {
    let n = {...s};
    ops.forEach(op=>{
      const [k,v] = op;
      if(k==="draw"){ const take=n.deck.slice(0,v); n.hand=[...n.hand,...take]; n.deck=n.deck.slice(v); if(take.length) n=L(n,`Drew ${take.length}.`); }
      else if(k==="res"){ n.res+=v; n=L(n,`+${v} resource.`); }
      else if(k==="life"){ n.myHP+=v; n=L(n,`+${v} life.`); }
      else if(k==="arcane"){ const total=v+n.amp; n.amp=0; n.dHP-=total; n=L(n,`${srcName}: ${total} arcane damage.`); }
      else if(k==="buffNext"){ n.buffNext+=v; n=L(n,`Next attack +${v}.`); }
      else if(k==="amp"){ n.amp+=v; n=L(n,`Amp ${v} — next arcane +${v}.`); }
      else if(k==="ward"){ n.ward+=v; n=L(n,`Ward ${v}.`); }
      else if(k==="awd"){ n.awd+=v; n=L(n,`Arcane ward ${v} — soaks spells, not fists.`); }
      else if(k==="rune"){ n.rune+=v; n=L(n,`+${v} Runechant.`); }
      else if(k==="rot"){ n.rot+=v; n=L(n,`Bloodrot on the dummy (ticks ${v}/turn).`); }
      else if(k==="fra"){ n.fra+=v; n=L(n,`Frailty — dummy's next swing −${v}.`); }
      else if(k==="noop"){ n=L(n,`${srcName}: ${v}.`); }
    });
    return n;
  };

  const execute = (s,card,from,idx) => {
    const fx = fxParse(card);
    let n = {...s, res:s.res-(card.cost||0), mode:"act", pending:null, paySel:[]};
    // move the card out of its zone
    if(from==="hand"){ n.hand = n.hand.filter((_,i)=>i!==idx); }
    if(from==="arsenal"){ n.arsenal = null; }
    if(from==="weapon"||from==="hero"){ n.weaponUsed = {...n.weaponUsed,[card.uid]:true}; }
    const preHP = n.dHP;
    const attacking = isAttack(card) || from==="weapon";
    let ga = fx.ga;
    // conditional clauses evaluated against this turn's history (before this card)
    fx.conds.forEach(({cond,op})=>{
      const met = cond==="atk" ? n.hist.atk>0 : cond==="non" ? n.hist.non>0 : false;
      if(!met){ n = L(n, `${card.name}: condition not met (${cond==="atk"?"no other attack yet":"no other non-attack yet"}).`); return; }
      if(op[0]==="ga") ga = true;
      else if(op[0]==="self" && attacking) n._condSelf = (n._condSelf||0)+op[1];
      else n = runOps(n,[op],card.name);
    });
    if(attacking){
      const bonus = (fx.self||0)+(n._condSelf||0)+n.buffNext;
      const total = (card.power||0)+bonus;
      n.buffNext = 0; delete n._condSelf;
      if(from==="hand"||from==="arsenal") n.grave=[card,...n.grave];
      n.pend = {card, total, ga, ops:fx.ops, onHit:fx.onHit};
      n.stack = [{k:"atk", label:`${card.name} — attack ${total}`}];
      const gi = n.dGear.findIndex(x=>gearDef(x)>0);
      if(total>=4 && gi>=0){
        const piece = n.dGear[gi];
        n.stack = [...n.stack, {k:"def", label:`Dummy: ${piece.name} — defend ${gearDef(piece)}`, gi}];
        n = L(n, `Dummy responds — ${piece.name} raised. Priority to you.`);
      } else {
        n = L(n, "Dummy passes. Priority to you — react or pass.");
      }
      n.mode = "stack";
      return n;
    } else {
      n = runOps(n, fx.ops, card.name);
      if(from==="hero" && card.sd){ n.gear = n.gear.map(x=> ("gp"+x.uid)===card.uid ? {...x,destroyed:true} : x); n = L(n, "The piece shatters — cost paid."); }
      if(fx.onHit.length) n = L(n, `${card.name}: on-hit clauses need an attack — skipped.`);
      if(fx.perm){ n.board=[...n.board,{card,kind:fx.perm,spent:false,uid:card.uid}]; n=L(n,`${card.name} enters play (${fx.perm}).`); }
      else if(from==="hand"||from==="arsenal") n.grave=[card,...n.grave];
      n.hist = {...n.hist, non:n.hist.non+1};
    }
    const delta = preHP - n.dHP;
    if(delta>0){ n.chain=[...n.chain,{n:card.name,img:card.img,dbImg:card.dbImg,dmg:delta,ga,kind:(isAttack(card)||from==="weapon")?"atk":"arc"}]; n.hitSeq=n.hitSeq+1; n.lastDmg=delta; }
    n.ap = ga ? n.ap : n.ap-1;
    if(ga) n = L(n,"Go again — action point kept.");
    return winCheck(n);
  };

  const playRx = i => setG(s=>{
    if(s.mode!=="stack" && s.mode!=="block") return s;
    const c = s.hand[i]; if(!c) return s;
    const fx = fxParse(c);
    const inAtk = s.mode==="stack";
    const ok = inAtk ? (isAR(c) || (isInstantT(c)&&fx.ops.length>0)) : (fx.dr || (isInstantT(c)&&fx.ops.length>0));
    if(!ok) return s;
    const cost = c.cost||0;
    if(s.res < cost) return L(s, `${c.name} costs ${cost} — float resources before the window opens.`);
    let n = {...s, res:s.res-cost, hand:s.hand.filter((_,x)=>x!==i), grave:[c,...s.grave]};
    if(inAtk){
      const pump = (fx.self||0) + fx.ops.filter(o=>o[0]==="buffNext").reduce((a,o)=>a+o[1],0);
      n = runOps(n, fx.ops.filter(o=>o[0]!=="buffNext"), c.name);
      n.stack = [...n.stack, {k:"rx", label:`${c.name} — +${pump}`, pump}];
      return L(n, `${c.name} on the stack (+${pump}). Dummy passes back.`);
    }
    const dv = c.def||0;
    n = runOps(n, fx.ops, c.name);
    n.blockRx = [...n.blockRx, {label:`${c.name} — defend ${dv}`, def:dv}];
    return L(n, `${c.name} played at instant speed — +${dv} defense.`);
  });
  const resolveStack = () => setG(s=>{
    if(s.mode!=="stack" || !s.pend) return s;
    let n = {...s};
    const pumps = n.stack.filter(l=>l.k==="rx").reduce((a,l)=>a+l.pump,0);
    const defL = n.stack.find(l=>l.k==="def");
    let total = n.pend.total + pumps;
    let blkNote = "";
    if(defL){
      const piece = n.dGear[defL.gi];
      const bd = Math.min(gearDef(piece), total);
      n.dGear = n.dGear.map((x,ix)=>ix===defL.gi?gearBlockApply(x):x);
      blkNote = ` ${piece.name} blocks ${bd}.`;
      total = Math.max(0, total-bd);
    }
    n.dHP -= total;
    let rd = 0, runeMsg = "";
    if(n.rune>0){ rd = n.rune*built.runeDmg; n.dHP-=rd; runeMsg = ` ${n.rune} Runechant${n.rune>1?"s":""} pop for ${rd} arcane.`; n.rune=0; }
    const pc = n.pend.card;
    n.chain = [...n.chain, {n:pc.name, img:pc.img, dbImg:pc.dbImg, dmg:total, ga:n.pend.ga, kind:"atk"}];
    if(total+rd>0){ n.hitSeq = n.hitSeq+1; n.lastDmg = total+rd; }
    n = L(n, `${pc.name} resolves for ${total}${pumps?` (+${pumps} reactions)`:""}.${blkNote}${runeMsg}`);
    n = runOps(n, n.pend.ops, pc.name);
    if(total>0) n = runOps(n, n.pend.onHit, pc.name);
    else if(n.pend.onHit.length) n = L(n, "Fully blocked — on-hit effects fizzle.");
    n.hist = {...n.hist, atk:n.hist.atk+1};
    n.ap = n.pend.ga ? n.ap : n.ap-1;
    if(n.pend.ga) n = L(n, "Go again — action point kept.");
    n.stack = []; n.pend = null; n.mode = "act";
    return winCheck(n);
  });
  const tryPlay = (card,from,idx) => setG(s=>{
    if(s.over||s.mode==="block"||s.mode==="arsenal"||s.mode==="stack") return s;
    if(s.inspect){ setZoom(card); return s; }
    if(s.mode==="pay"){
      if(from!=="hand" || (s.pending&&s.pending.from==="hand"&&s.pending.idx===idx)) return s;
      const sel = s.paySel.includes(idx) ? s.paySel.filter(i=>i!==idx) : [...s.paySel,idx];
      return {...s,paySel:sel};
    }
    if(s.ap<1) return L(s,"No action point left — end your turn.");
    const fx = fxParse(card);
    if(from==="hand" && isAttack(card) && isArrow(card)) return L(s,"Arrows fire from the arsenal. Set it at end of turn.");
    if(from!=="weapon" && from!=="hero" && !isAttack(card) && !fx.playable) return L(s,`${card.name}: no scripted effect yet — pitch it, block with it, or ℹ to read it.`);
    if((from==="weapon"||from==="hero") && s.weaponUsed[card.uid]) return L(s, from==="hero" ? "Already used this turn." : `${card.name} already swung this turn.`);
    const cost = card.cost||0;
    if(s.res>=cost) return execute(s,card,from,idx);
    return {...s, mode:"pay", pending:{card,from,idx}, paySel:[], log:[`Pitch ${cost-s.res} more for ${card.name}.`,...s.log].slice(0,4)};
  });
  const confirmPay = () => setG(s=>{
    if(!s.pending) return s;
    const gain = s.paySel.reduce((a,i)=>a+(s.hand[i].pitch||0),0);
    const need = (s.pending.card.cost||0)-s.res;
    if(gain<need) return L(s,`Selected pitch ${gain}, need ${need}.`);
    const pitched = s.paySel.map(i=>s.hand[i]);
    const keepIdx = s.hand.map((_,i)=>i).filter(i=>!s.paySel.includes(i));
    let pendIdx = s.pending.from==="hand" ? keepIdx.indexOf(s.pending.idx) : s.pending.idx;
    let n = {...s, res:s.res+gain, hand:keepIdx.map(i=>s.hand[i]), pitch:[...s.pitch,...pitched]};
    n = L(n, `Pitched ${pitched.map(c=>c.name).join(", ")} for ${gain}.`);
    return execute(n, s.pending.card, s.pending.from, pendIdx);
  });
  const cancelPay = () => setG(s=>({...s,mode:"act",pending:null,paySel:[]}));

  const allySwing = bi => setG(s=>{
    if(s.over||s.mode!=="act") return s;
    const b = s.board[bi];
    if(!b || b.kind!=="ally" || b.spent || !(b.card.power>0)) return s;
    let n = {...s, dHP:s.dHP-b.card.power, board:s.board.map((x,i)=>i===bi?{...x,spent:true}:x)};
    n.chain=[...n.chain,{n:b.card.name,img:b.card.img,dbImg:b.card.dbImg,dmg:b.card.power,ga:false,kind:"atk"}];
    n.hitSeq=n.hitSeq+1; n.lastDmg=b.card.power;
    n = L(n, `${b.card.name} attacks for ${b.card.power} (ally — simplified, no action point).`);
    return winCheck(n);
  });

  const endTurn = () => setG(s=>{
    if(s.over||s.mode!=="act") return s;
    let n = {...s, wasted:s.wasted+s.res, res:0, buffNext:0};
    if(s.res>0) n = L(n, `${s.res} resource${s.res>1?"s":""} fizzled — wasted.`);
    n.deck = [...n.deck, ...n.pitch]; n.pitch=[];
    if(!n.arsenal && n.hand.length) return {...n, mode:"arsenal", log:["Set one card into arsenal, or skip.",...n.log].slice(0,4)};
    return afterArsenal(n);
  });
  const pickArsenal = idx => setG(s=>{
    if(s.mode!=="arsenal") return s;
    let n = {...s, arsenal:s.hand[idx], hand:s.hand.filter((_,i)=>i!==idx)};
    return afterArsenal(L(n,`${n.arsenal.name} set face down in arsenal.`));
  });
  const skipArsenal = () => setG(s=> s.mode==="arsenal" ? afterArsenal(s) : s);
  function afterArsenal(s){
    let n={...s};
    const need = Math.max(0, n.myInt - n.hand.length);
    const drawn = n.deck.slice(0,need);
    n.hand=[...n.hand,...drawn]; n.deck=n.deck.slice(need);
    if(drawn.length<need && n.hand.length===0){ n.over={win:false}; return L(n,"Deck empty — fatigued. The dummy wins by attrition."); }
    if(n.rot>0){ n.dHP-=n.rot; n.chain=[...n.chain,{n:"Bloodrot",img:null,dbImg:null,dmg:n.rot,ga:false,kind:"arc"}]; n.hitSeq=n.hitSeq+1; n.lastDmg=n.rot; n=L(n,`Bloodrot ticks the dummy for ${n.rot}.`); n=winCheck(n); if(n.over) return n; }
    const base = [3,4,5][(n.turn-1)%3] + (n.turn>6?1:0);
    n.incoming = Math.max(0, base - n.fra);
    if(n.fra>0){ n=L(n,`Frailty saps the swing: ${base} → ${n.incoming}.`); n.fra=0; }
    n.chain=[...n.chain,{n:"Dummy",img:null,dbImg:null,dmg:n.incoming,ga:false,kind:"foe"}];
    n.mode="block"; n.blockH=[]; n.blockG=[]; n.blockRx=[];
    return L(n, `Dummy swings for ${n.incoming}. Priority to you — reactions, blocks, or take it.`);
  }
  const toggleBlock = (kind,i) => setG(s=>{
    if(s.mode!=="block") return s;
    const key = kind==="h"?"blockH":"blockG";
    const arr = s[key].includes(i)?s[key].filter(x=>x!==i):[...s[key],i];
    return {...s,[key]:arr};
  });
  const takeIt = () => setG(s=>{
    if(s.mode!=="block") return s;
    const dh = s.blockH.reduce((a,i)=>a+(s.hand[i].def||0),0);
    const dg = s.blockG.reduce((a,i)=>a+gearDef(s.gear[i]),0);
    const drx = s.blockRx.reduce((a,l)=>a+l.def,0);
    let through = Math.max(0, s.incoming-dh-dg-drx);
    let wardNote = "";
    let ward = s.ward;
    if(through>0 && ward>0){ const use=Math.min(ward,through); through-=use; ward-=use; wardNote=` Ward soaks ${use}.`; }
    const drNames = s.blockH.filter(i=>fxParse(s.hand[i]).dr).map(i=>s.hand[i].name);
    let n = {...s, myHP:s.myHP-through, ward,
      hand:s.hand.filter((_,i)=>!s.blockH.includes(i)),
      grave:[...s.blockH.map(i=>s.hand[i]),...s.grave],
      gear:s.gear.map((gr,i)=>s.blockG.includes(i)?gearBlockApply(gr):gr),
      blockH:[],blockG:[],blockRx:[]};
    n = L(n, `Blocked ${dh+dg+drx}, took ${through}.${wardNote}${drNames.length?` (${drNames.join(", ")} as defense reaction${drNames.length>1?"s":""}.)`:""}`);
    if(n.myHP<=5 && n.myHP>0 && !n.flags.p5) n = L({...n, flags:{...n.flags, p5:true}}, "On the ropes — every block counts now.");
    if(n.myHP<=0){ n.over={win:false}; return L(n,"You hit the boards. The dummy remains undefeated."); }
    return newTurn(n);
  });
