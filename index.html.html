<html lang="en">

<title>DAWNBLADE — Silver Age Training Hall</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800&family=Spline+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
:root{
  --r:#C4302B; --y:#E8B33C; --b:#3B6FB0;
  --ink:#14100E; --forge:#241B16; --forge2:#2E241D;
  --bone:#E8DFD0; --bone-dim:#B8AC98; --line:#4A3B2E;
  --ok:#7BA05B;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--ink);color:var(--bone);font-family:'Spline Sans',sans-serif;font-size:15px;line-height:1.45;overscroll-behavior:none}
#root{min-height:100%;display:flex;flex-direction:column}
h1,h2,h3,.disp{font-family:'Big Shoulders Display',sans-serif;letter-spacing:.02em;text-transform:uppercase}
.mono{font-family:'Spline Sans Mono',monospace}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
img{display:block;max-width:100%}
.clip{clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px))}
.clip-sm{clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px))}

/* shell */
.shell{flex:1;display:flex;flex-direction:column;max-width:560px;width:100%;margin:0 auto;padding:max(10px,env(safe-area-inset-top)) 12px calc(64px + env(safe-area-inset-bottom))}
.topbar{display:flex;align-items:baseline;justify-content:space-between;padding:6px 2px 10px}
.brand{font-family:'Big Shoulders Display';font-weight:800;font-size:22px;letter-spacing:.06em}
.brand em{font-style:normal;color:var(--y)}
.tag{font-size:10px;color:var(--bone-dim);text-transform:uppercase;letter-spacing:.14em}
.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;gap:2px;background:var(--ink);border-top:1px solid var(--line);padding:6px 6px calc(6px + env(safe-area-inset-bottom));z-index:40}
.tab{flex:1;max-width:132px;text-align:center;padding:9px 4px;font-family:'Big Shoulders Display';font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--bone-dim)}
.tab.on{color:var(--ink);background:var(--y)}
.tab.on.fight{background:var(--r);color:var(--bone)}

/* db banner */
.dbbar{display:flex;align-items:center;gap:8px;background:var(--forge);border:1px solid var(--line);padding:8px 10px;margin-bottom:10px;font-size:12px}
.dbbar .dot{width:8px;height:8px;flex:none;background:var(--y);animation:pulse 1.1s infinite alternate}
.dbbar.ok .dot{background:var(--ok);animation:none}
.dbbar.err .dot{background:var(--r);animation:none}
@keyframes pulse{to{opacity:.25}}
.dbbar .retry{margin-left:auto;color:var(--y);font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.08em}
.prog{height:3px;background:var(--forge2);margin-top:5px;width:100%}
.prog i{display:block;height:100%;background:var(--y);transition:width .3s}

/* hero select */
.chapter{margin:16px 0 8px;font-size:12px;color:var(--bone-dim);letter-spacing:.18em;text-transform:uppercase;display:flex;align-items:center;gap:10px}
.chapter::after{content:"";flex:1;height:1px;background:var(--line)}
.hgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.hcard{position:relative;background:var(--forge);border:1px solid var(--line);text-align:left;overflow:hidden;padding:0}
.hcard .art{width:100%;aspect-ratio:5/7;object-fit:cover;object-position:top;filter:saturate(.92)}
.hcard .nm{position:absolute;left:0;right:0;bottom:0;padding:22px 9px 8px;background:linear-gradient(transparent,rgba(20,16,14,.95) 55%)}
.hcard .nm b{display:block;font-family:'Big Shoulders Display';font-size:17px;font-weight:800;letter-spacing:.04em;line-height:1}
.hcard .nm span{font-size:10px;color:var(--y);text-transform:uppercase;letter-spacing:.1em}
.hcard .best{position:absolute;top:6px;right:6px;background:var(--ink);border:1px solid var(--y);color:var(--y);font-size:10px;padding:2px 6px;font-family:'Spline Sans Mono'}
.fallbackart{width:100%;aspect-ratio:5/7;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--forge2),var(--ink));font-family:'Big Shoulders Display';font-size:34px;font-weight:800;color:var(--line)}

/* hero sheet */
.sheet{background:var(--forge);border:1px solid var(--line);padding:14px;margin-top:12px}
.sheet h2{font-size:26px;font-weight:800}
.sheet .cls{color:var(--y);font-size:12px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.statrow{display:flex;gap:14px;margin:10px 0;font-family:'Spline Sans Mono';font-size:13px}
.statrow b{color:var(--y)}
.bigbtn{display:block;width:100%;padding:14px;background:var(--r);color:var(--bone);font-family:'Big Shoulders Display';font-weight:800;font-size:19px;letter-spacing:.1em;text-transform:uppercase;text-align:center;margin-top:12px}
.bigbtn.alt{background:var(--forge2);border:1px solid var(--line);color:var(--bone);font-size:15px;padding:11px}
.bigbtn:disabled{opacity:.4}

/* deck viewer */
.dsec{margin:14px 0 6px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--bone-dim)}
.dsec.p1{color:var(--r)}.dsec.p2{color:var(--y)}.dsec.p3{color:var(--b)}
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.cgrid .cc{position:relative;padding:0;background:var(--forge)}
.cgrid img{aspect-ratio:5/7;object-fit:cover;width:100%}
.cc .q{position:absolute;top:4px;left:4px;background:var(--ink);border:1px solid var(--line);font-family:'Spline Sans Mono';font-size:11px;padding:1px 5px}
.ccfall{aspect-ratio:5/7;display:flex;flex-direction:column;justify-content:space-between;padding:8px;border:1px solid var(--line);font-size:11px;line-height:1.25}
.ccfall .pn{font-family:'Big Shoulders Display';font-weight:700;font-size:13px}
.pb1{box-shadow:inset 0 -3px 0 var(--r)}.pb2{box-shadow:inset 0 -3px 0 var(--y)}.pb3{box-shadow:inset 0 -3px 0 var(--b)}

/* battle */
.board{display:flex;flex-direction:column;gap:10px}
.dummy{background:var(--forge);border:1px solid var(--line);padding:12px;display:flex;align-items:center;gap:12px}
.dummy .hp{font-family:'Big Shoulders Display';font-weight:800;font-size:40px;line-height:1;color:var(--r)}
.dummy .lbl{font-size:11px;color:var(--bone-dim);text-transform:uppercase;letter-spacing:.1em}
.dummy .incoming{margin-left:auto;text-align:right;font-family:'Spline Sans Mono';font-size:12px;color:var(--y)}
.mystat{display:flex;gap:8px;flex-wrap:wrap;font-family:'Spline Sans Mono';font-size:12px}
.pill{background:var(--forge);border:1px solid var(--line);padding:5px 9px}
.pill b{color:var(--y)}
.pill.hp b{color:var(--r)}
.log{background:var(--forge);border:1px solid var(--line);padding:9px 10px;font-size:12.5px;min-height:44px;color:var(--bone)}
.log .dim{color:var(--bone-dim)}
.zone{font-size:11px;color:var(--bone-dim);text-transform:uppercase;letter-spacing:.12em;margin:2px 2px 4px}
.hand{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.hand .hc{position:relative;padding:0;background:var(--forge);border:1px solid var(--line);transition:transform .12s}
.hand .hc img{aspect-ratio:5/7;object-fit:cover;width:100%}
.hand .hc.sel{transform:translateY(-6px);border-color:var(--y);box-shadow:0 0 0 1px var(--y)}
.hand .hc.dis{opacity:.45}
.hand .hc .cost{position:absolute;top:3px;left:3px;background:var(--ink);font-family:'Spline Sans Mono';font-size:11px;padding:1px 5px;border:1px solid var(--line)}
.hand .hc .pw{position:absolute;bottom:3px;left:3px;background:var(--ink);font-family:'Spline Sans Mono';font-size:11px;padding:1px 5px;border:1px solid var(--r);color:var(--r)}
.hand .hc .df{position:absolute;bottom:3px;right:3px;background:var(--ink);font-family:'Spline Sans Mono';font-size:11px;padding:1px 5px;border:1px solid var(--b);color:var(--b)}
.arsenalrow{display:flex;gap:8px;align-items:stretch}
.arsenalrow .slot{width:64px;flex:none;border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--bone-dim);text-transform:uppercase;letter-spacing:.08em;text-align:center;padding:4px}
.arsenalrow .slot img{aspect-ratio:5/7;object-fit:cover}
.gearrow{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.gearrow .g{flex:none;width:56px;position:relative;padding:0;background:var(--forge);border:1px solid var(--line)}
.gearrow .g img{aspect-ratio:5/7;object-fit:cover}
.gearrow .g.used{opacity:.35}
.gearrow .g .gd{position:absolute;bottom:2px;right:2px;background:var(--ink);font-family:'Spline Sans Mono';font-size:10px;padding:0 4px;border:1px solid var(--b);color:var(--b)}
.actrow{display:flex;gap:8px}
.actrow .a{flex:1;padding:12px 6px;font-family:'Big Shoulders Display';font-weight:800;font-size:16px;letter-spacing:.08em;text-transform:uppercase;background:var(--forge2);border:1px solid var(--line)}
.actrow .a.go{background:var(--r)}
.actrow .a.pay{background:var(--y);color:var(--ink)}
.actrow .a:disabled{opacity:.4}
.paymode{border:1px solid var(--y);background:rgba(232,179,60,.07);padding:8px 10px;font-size:12.5px}
.blockmode{border:1px solid var(--b);background:rgba(59,111,176,.08);padding:8px 10px;font-size:12.5px}

/* card modal */
.modal{position:fixed;inset:0;background:rgba(10,8,7,.82);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px}
.modal .inner{max-width:340px;width:100%}
.modal img{width:100%;border:1px solid var(--line)}
.modal .txt{background:var(--forge);border:1px solid var(--line);padding:10px;font-size:13px;margin-top:8px}
.modal .chip{display:inline-block;margin-top:8px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--bone-dim);border:1px solid var(--line);padding:2px 7px}

/* reveal + judge + misc */
.reveal{position:fixed;inset:0;background:rgba(10,8,7,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:70;text-align:center;padding:24px}
.reveal .card{width:200px;background:var(--forge);border:1px solid var(--y);padding:18px 14px;position:relative;overflow:hidden}
.reveal .card::before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,var(--r),var(--y),var(--b));transform:translateX(-101%);animation:bleed 1.1s .15s forwards}
@keyframes bleed{60%{transform:translateX(0)}100%{transform:translateX(101%)}}
.reveal h3{font-size:22px;position:relative}
.reveal .rar{font-size:11px;letter-spacing:.2em;color:var(--y);text-transform:uppercase;position:relative}
.qopt{display:block;width:100%;text-align:left;padding:11px 12px;background:var(--forge);border:1px solid var(--line);margin-top:8px;font-size:14px}
.qopt.right{border-color:var(--ok);color:var(--ok)}
.qopt.wrong{border-color:var(--r);color:var(--r)}
.explain{border-left:3px solid var(--y);padding:8px 10px;background:var(--forge);margin-top:10px;font-size:13px}
.note{font-size:11.5px;color:var(--bone-dim);margin-top:10px;line-height:1.5}
.note a{color:var(--y)}
.win{border:1px solid var(--ok);background:rgba(123,160,91,.08);padding:12px;text-align:center}
.lose{border:1px solid var(--r);background:rgba(196,48,43,.08);padding:12px;text-align:center}
.cdnfail{display:none;padding:40px 20px;text-align:center;font-family:sans-serif;color:#E8DFD0}
</style>
</head>

<script type="text/babel" data-presets="env,react">
const {useState,useEffect,useMemo,useCallback} = React;

/* ---------- storage ---------- */
const store = {
  get(k,f){ try{const v=localStorage.getItem("dawnblade."+k); return v==null?f:JSON.parse(v);}catch(e){return f;} },
  set(k,v){ try{localStorage.setItem("dawnblade."+k, JSON.stringify(v));}catch(e){} }
};

/* ---------- helpers ---------- */
const norm = s => s.toLowerCase().replace(/[^a-z0-9]+/g," ").trim();
const cdnImg = code => code ? (CDN + code + ".webp") : null;
const toNum = v => { const n = parseInt(v,10); return isNaN(n) ? null : n; };
const PITCH_NAME = {1:"red",2:"yellow",3:"blue"};

function parseDeck(raw){
  const gear=[], deck=[]; let hero=null;
  raw.trim().split("\n").forEach(line=>{
    const [a,name,p,code] = line.split("|");
    const e = {name:name.trim(), p:parseInt(p,10)||0, code:(code||"").trim()||null};
    if(a==="H") hero=e; else if(a==="G") gear.push(e); else { e.q=parseInt(a,10)||1; deck.push(e); }
  });
  return {hero,gear,deck};
}
const PARSED = {}; HEROES.forEach(h=>{ PARSED[h.k]=parseDeck(DECKS[h.k]); });

/* every card name we need from the database */
const NEEDED = new Set();
Object.values(PARSED).forEach(d=>{
  NEEDED.add(norm(d.hero.name));
  d.gear.forEach(e=>NEEDED.add(norm(e.name)));
  d.deck.forEach(e=>{ NEEDED.add(norm(e.name)); if(e.name.includes("//")) NEEDED.add(norm(e.name.split("//")[0])); });
});

/* ---------- card database (the-fab-cube, open data) ---------- */
function useCardDB(){
  const [state,setState] = useState({status:"idle",pct:0,byNP:{},byName:{},count:0,err:null});
  const load = useCallback(async(force)=>{
    setState(s=>({...s,status:"loading",pct:0,err:null}));
    try{
      let cards = null;
      if(!force){
        const cached = store.get("dbcache_"+DATA_VER, null);
        if(cached && Array.isArray(cached)) cards = cached;
      }
      if(!cards){
        const res = await fetch(DBSRC);
        if(!res.ok) throw new Error("HTTP "+res.status);
        const total = +res.headers.get("content-length") || 0;
        let text;
        if(res.body && total){
          const reader = res.body.getReader(); const chunks=[]; let got=0;
          for(;;){ const {done,value}=await reader.read(); if(done)break;
            chunks.push(value); got+=value.length;
            setState(s=>({...s,pct:Math.min(99,Math.round(got/total*100))})); }
          const buf=new Uint8Array(got); let o=0; chunks.forEach(c=>{buf.set(c,o);o+=c.length;});
          text = new TextDecoder().decode(buf);
        } else { text = await res.text(); }
        const all = JSON.parse(text);
        cards = [];
        all.forEach(c=>{
          if(!c || !c.name) return;
          if(!NEEDED.has(norm(c.name))) return;
          const prints={};
          (c.printings||[]).forEach(pr=>{
            const id = pr.id || pr.identifier || pr.set_printing_unique_id || null;
            const url = pr.image_url || pr.image || null;
            if(url){ if(id) prints[id]=url; if(!prints._first) prints._first=url; }
          });
          cards.push({
            n:c.name, p:toNum(c.pitch), c:toNum(c.cost), pw:toNum(c.power),
            d:toNum(c.defense), hp:toNum(c.health), int:toNum(c.intelligence),
            tt:c.type_text||((c.types||[]).join(" ")), kw:(c.card_keywords||[]).concat(c.granted_keywords||[]),
            tx:c.functional_text_plain||c.functional_text||"", pr:prints
          });
        });
        store.set("dbcache_"+DATA_VER, cards);
      }
      const byNP={}, byName={};
      cards.forEach(c=>{
        const k=norm(c.n);
        byNP[k+"|"+(c.p==null?0:c.p)]=c;
        (byName[k]=byName[k]||[]).push(c);
      });
      setState({status:"ready",pct:100,byNP,byName,count:cards.length,err:null});
    }catch(e){ setState(s=>({...s,status:"error",err:String(e&&e.message||e)})); }
  },[]);
  useEffect(()=>{ load(false); },[load]);
  return [state,load];
}

function resolveEntry(db, e){
  const k = norm(e.name);
  let cands = db.byName[k];
  if(!cands && e.name.includes("//")) cands = db.byName[norm(e.name.split("//")[0])];
  let card = null;
  if(cands){
    if(e.p>0) card = cands.find(c=>c.p===e.p) || null;
    if(!card && e.code) card = cands.find(c=>c.pr[e.code]) || null;
    if(!card) card = cands.slice().sort((a,b)=>(a.p??9)-(b.p??9))[0];
  }
  const img = cdnImg(e.code) || (card ? (card.pr[e.code]||card.pr._first) : null);
  const dbImg = card ? (card.pr._first||null) : null;
  return {
    name:e.name, q:e.q||1, code:e.code,
    pitch: card&&card.p!=null ? card.p : (e.p||0),
    cost: card?card.c:null, power: card?card.pw:null, def: card?card.d:null,
    tt: card?card.tt:"", kw: card?card.kw:[], tx: card?card.tx:"",
    img, dbImg, resolved: !!card
  };
}
const isAttack = c => /attack/i.test(c.tt) && /action/i.test(c.tt) && c.power!=null;
const isArrow  = c => /arrow/i.test(c.tt);
const isWeapon = c => /weapon/i.test(c.tt) && c.power!=null;
const hasGA = c => (c.kw||[]).some(k=>/go again/i.test(k)) || /\bgo again\b/i.test(c.tx||"");
const arcaneDmg = c => { const m=(c.tx||"").match(/deals? (\d+) arcane damage/i); return m?+m[1]:null; };

/* ---------- shared UI ---------- */
function CardImg({card, className}){
  const [stage,setStage] = useState(0); // 0 primary, 1 db, 2 fallback
  const src = stage===0 ? card.img : stage===1 ? card.dbImg : null;
  if(src) return <img className={className} src={src} loading="lazy" alt={card.name}
    onError={()=>setStage(s=> s===0 && card.dbImg && card.dbImg!==card.img ? 1 : 2)}/>;
  return (
    <div className={"ccfall pb"+(card.pitch||1)}>
      <div className="pn">{card.name}</div>
      <div className="mono">{card.cost!=null?("cost "+card.cost):""} {card.power!=null?(" · "+card.power+"⚔"):""} {card.def!=null?(" · "+card.def+"🛡"):""}</div>
    </div>
  );
}
function CardModal({card,onClose}){
  if(!card) return null;
  return (
    <div className="modal" onClick={onClose}>
      <div className="inner" onClick={e=>e.stopPropagation()}>
        <CardImg card={card}/>
        <div className="txt">
          <b>{card.name}</b>{card.pitch?<span className="mono"> · pitch {card.pitch} ({PITCH_NAME[card.pitch]})</span>:null}
          <div className="mono" style={{margin:"4px 0"}}>{card.tt}</div>
          {card.tx ? <div>{card.tx}</div> : <div className="dim">Stats loaded; rules text pending database.</div>}
          <span className="chip">stats live · full card effects not simulated yet</span>
        </div>
        <button className="bigbtn alt" onClick={onClose}>Close</button>
      </div>
    </div>
  );
}
function DbBanner({db,reload}){
  if(db.status==="ready") return (
    <div className="dbbar ok"><span className="dot"/><span>Card database forged — {db.count} cards live (fab-cube open data)</span></div>
  );
  if(db.status==="error") return (
    <div className="dbbar err"><span className="dot"/><span>Database fetch failed: {db.err}. Art still loads; stats need the DB.</span>
      <button className="retry" onClick={()=>reload(true)}>Retry</button></div>
  );
  return (
    <div className="dbbar"><span className="dot"/>
      <span style={{flex:1}}>Forging card database — first visit only<div className="prog"><i style={{width:db.pct+"%"}}/></div></span>
    </div>
  );
}

/* ---------- hero select + deck view ---------- */
function HeroGrid({onPick,best}){
  const chapters = [1,2,3];
  return (
    <div>
      {chapters.map(ch=>(
        <div key={ch}>
          <div className="chapter">Chapter {ch}</div>
          <div className="hgrid">
            {HEROES.filter(h=>h.ch===ch).map(h=>(
              <button key={h.k} className="hcard clip" onClick={()=>onPick(h)}>
                <HeroArt h={h}/>
                {best[h.k]!=null && <span className="best">★ {best[h.k]}</span>}
                <span className="nm"><b>{h.n}</b><span>{h.cls}</span></span>
              </button>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}
function HeroArt({h}){
  const [err,setErr]=useState(false);
  if(err) return <div className="fallbackart">{h.n.split(/[ ,]/)[0]}</div>;
  return <img className="art" src={cdnImg(h.code)} loading="lazy" alt={h.n} onError={()=>setErr(true)}/>;
}
function HeroSheet({h,db,onBack,onFight,best}){
  const d = PARSED[h.k];
  const heroCard = db.status==="ready" ? resolveEntry(db,{...d.hero,q:1}) : null;
  const hp = heroCard&&heroCard.resolved&&heroCard.tx!==undefined ? (db.byName[norm(d.hero.name)]||[])[0] : null;
  const hHP = hp&&hp.hp!=null ? hp.hp : 20;
  const hINT = hp&&hp.int!=null ? hp.int : 4;
  const [view,setView]=useState(false);
  const [zoom,setZoom]=useState(null);
  return (
    <div>
      <button className="tag" onClick={onBack}>← all heroes</button>
      <div className="sheet clip">
        <h2>{h.n}</h2>
        <div className="cls">{h.cls} · Chapter {h.ch} · Silver Age precon</div>
        <p style={{fontSize:13.5}}>{h.blurb}</p>
        <div className="statrow">
          <span>LIFE <b>{hHP}</b></span><span>INTELLECT <b>{hINT}</b></span>
          <span>DECK <b>{d.deck.reduce((a,e)=>a+e.q,0)}</b></span><span>GEAR <b>{d.gear.length}</b></span>
          {best[h.k]!=null && <span>BEST <b>{best[h.k]}</b></span>}
        </div>
        <button className="bigbtn" disabled={db.status!=="ready"} onClick={()=>onFight(h)}>
          {db.status==="ready" ? "Enter the training hall" : "Waiting on card DB…"}
        </button>
        <button className="bigbtn alt" onClick={()=>setView(v=>!v)}>{view?"Hide official 55":"View official 55"}</button>
      </div>
      {view && <DeckView h={h} db={db} onZoom={setZoom}/>}
      <CardModal card={zoom} onClose={()=>setZoom(null)}/>
      <p className="note">Decklist as published by Legend Story Studios for the Silver Age {h.n} precon. Card images © LSS, served from their public card CDN. This is an unofficial fan trainer, not affiliated with LSS.</p>
    </div>
  );
}
function DeckView({h,db,onZoom}){
  const d = PARSED[h.k];
  const ready = db.status==="ready";
  const R = e => ready ? resolveEntry(db,e) : {name:e.name,q:e.q||1,pitch:e.p,img:cdnImg(e.code),dbImg:null,tt:"",tx:"",kw:[]};
  const gear = d.gear.map(R);
  const secs = [[1,"Pitch 1 — Red"],[2,"Pitch 2 — Yellow"],[3,"Pitch 3 — Blue"]];
  const byPitch = p => d.deck.map(R).filter(c=>c.pitch===p);
  const other = d.deck.map(R).filter(c=>!c.pitch||c.pitch<1||c.pitch>3);
  const missing = ready ? d.deck.concat(d.gear).map(R).filter(c=>!c.resolved).map(c=>c.name) : [];
  const Grid = ({cards}) => (
    <div className="cgrid">{cards.map((c,i)=>(
      <button key={i} className="cc clip-sm" onClick={()=>onZoom(c)}>
        <CardImg card={c}/><span className="q">{c.q}×</span>
      </button>))}
    </div>
  );
  return (
    <div>
      <div className="dsec">Hero · Weapons · Equipment</div><Grid cards={gear}/>
      {secs.map(([p,label])=> byPitch(p).length ? <div key={p}><div className={"dsec p"+p}>{label}</div><Grid cards={byPitch(p)}/></div> : null)}
      {other.length ? <div><div className="dsec">Awaiting pitch data</div><Grid cards={other}/></div> : null}
      {missing.length ? <p className="note">Not yet in the open card DB (stats pending): {[...new Set(missing)].join(", ")}.</p> : null}
    </div>
  );
}
</script>

<script type="text/babel" data-presets="env,react">
const {useState:uS,useMemo:uM,useEffect:uE} = React;
const shuffle = a => { const x=a.slice(); for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];} return x; };

/* ---------- BATTLE ---------- */
function Battle({h,db,onExit,onRecord}){
  const built = uM(()=>{
    const d = PARSED[h.k];
    const heroRec = (db.byName[norm(d.hero.name)]||[])[0]||{};
    let uid=0;
    const deck = shuffle(d.deck.flatMap(e=>{
      const c = resolveEntry(db,e);
      return Array.from({length:e.q},()=>({...c,uid:++uid}));
    }));
    const gear = d.gear.map(e=>({...resolveEntry(db,e),uid:++uid,used:false}));
    return {deck,gear,myHP:heroRec.hp!=null?heroRec.hp:20,myInt:heroRec.int!=null?heroRec.int:4};
  },[h,db]);

  const [g,setG] = uS(()=>({
    deck:built.deck.slice(built.myInt), hand:built.deck.slice(0,built.myInt),
    arsenal:null, pitch:[], grave:[], gear:built.gear,
    res:0, ap:1, turn:1, wasted:0, dHP:42, myHP:built.myHP, myInt:built.myInt,
    weaponUsed:{}, mode:"act", pending:null, paySel:[], incoming:0, blockH:[], blockG:[],
    log:["The dummy creaks to life. 42 to carve away — go."], over:null, inspect:false
  }));
  const [zoom,setZoom]=uS(null);
  const L = (s,msg)=>({...s, log:[msg, ...s.log].slice(0,4)});

  const playable = c => {
    if(isAttack(c)) return isArrow(c) ? "arsenal-only" : "attack";
    if(arcaneDmg(c)!=null) return "arcane";
    return null;
  };
  const damageOf = c => isAttack(c)?c.power:(arcaneDmg(c)||0);

  const execute = (s,card,from,idx) => {
    const dmg = damageOf(card), ga = hasGA(card);
    let n = {...s, res:s.res-(card.cost||0), dHP:s.dHP-dmg, ap: ga? s.ap : s.ap-1, mode:"act", pending:null, paySel:[]};
    if(from==="hand") n.hand = s.hand.filter((_,i)=>i!==idx), n.grave=[card,...s.grave];
    if(from==="arsenal") n.arsenal=null, n.grave=[card,...s.grave];
    if(from==="weapon") n.weaponUsed={...s.weaponUsed,[card.uid]:true};
    n = L(n, `${card.name} hits for ${dmg}${ga?" — go again":""}.`);
    if(n.dHP<=0){ n.over={win:true, score:n.turn+n.wasted}; n.log=[`Dummy down on turn ${n.turn}. Score ${n.turn+n.wasted} (turns + wasted resources).`,...n.log]; }
    return n;
  };
  const tryPlay = (card,from,idx) => setG(s=>{
    if(s.over||s.mode==="block"||s.mode==="arsenal") return s;
    if(s.inspect){ setZoom(card); return s; }
    if(s.mode==="pay"){ // selecting pitch fodder
      if(from!=="hand" || (s.pending&&s.pending.from==="hand"&&s.pending.idx===idx)) return s;
      const sel = s.paySel.includes(idx) ? s.paySel.filter(i=>i!==idx) : [...s.paySel,idx];
      return {...s,paySel:sel};
    }
    if(s.ap<1) return L(s,"No action point left — end your turn.");
    const kind = playable(card);
    if(from==="hand" && kind==="arsenal-only") return L(s,"Arrows fire from the arsenal. Set it at end of turn.");
    if(from!=="weapon" && !kind) return L(s,`${card.name}: effect not simulated yet — pitch it for resources or block with it.`);
    if(from==="weapon" && s.weaponUsed[card.uid]) return L(s,`${card.name} already swung this turn.`);
    const cost = card.cost||0;
    if(s.res>=cost) return execute(s,card,from,idx);
    return {...s, mode:"pay", pending:{card,from,idx}, paySel:[], log:[`Pitch ${cost-s.res} more for ${card.name}.`,...s.log].slice(0,4)};
  });
  const confirmPay = () => setG(s=>{
    if(!s.pending) return s;
    const gain = s.paySel.reduce((a,i)=>a+(s.hand[i].pitch||0),0);
    const need = (s.pending.card.cost||0)-s.res;
    if(gain<need) return L(s,`Selected pitch ${gain}, need ${need}.`);
    const pitched = s.paySel.map(i=>s.hand[i]);
    const keepIdx = s.hand.map((_,i)=>i).filter(i=>!s.paySel.includes(i));
    let pendIdx = s.pending.from==="hand" ? keepIdx.indexOf(s.pending.idx) : s.pending.idx;
    let n = {...s, res:s.res+gain, hand:keepIdx.map(i=>s.hand[i]), pitch:[...s.pitch,...pitched]};
    n = L(n, `Pitched ${pitched.map(c=>c.name).join(", ")} for ${gain}.`);
    return execute(n, s.pending.card, s.pending.from, pendIdx);
  });
  const cancelPay = () => setG(s=>({...s,mode:"act",pending:null,paySel:[]}));

  const endTurn = () => setG(s=>{
    if(s.over||s.mode!=="act") return s;
    let n = {...s, wasted:s.wasted+s.res, res:0};
    if(s.res>0) n = L(n, `${s.res} resource${s.res>1?"s":""} fizzled — wasted.`);
    n.deck = [...n.deck, ...n.pitch]; n.pitch=[]; // pitched to bottom
    if(!n.arsenal && n.hand.length) return {...n, mode:"arsenal", log:["Set one card into arsenal, or skip.",...n.log].slice(0,4)};
    return afterArsenal(n);
  });
  const pickArsenal = idx => setG(s=>{
    if(s.mode!=="arsenal") return s;
    let n = {...s, arsenal:s.hand[idx], hand:s.hand.filter((_,i)=>i!==idx)};
    return afterArsenal(L(n,`${n.arsenal.name} set face down in arsenal.`));
  });
  const skipArsenal = () => setG(s=> s.mode==="arsenal" ? afterArsenal(s) : s);
  function afterArsenal(s){
    let n={...s};
    const need = Math.max(0, n.myInt - n.hand.length);
    const drawn = n.deck.slice(0,need);
    n.hand=[...n.hand,...drawn]; n.deck=n.deck.slice(need);
    if(drawn.length<need && n.hand.length===0){ n.over={win:false}; return L(n,"Deck empty — fatigued. The dummy wins by attrition."); }
    if(n.turn>=1){
      n.incoming = [3,4,5][(n.turn-1)%3] + (n.turn>6?1:0);
      n.mode="block"; n.blockH=[]; n.blockG=[];
      return L(n, `Dummy swings back for ${n.incoming}. Tap blockers, then take it.`);
    }
    return newTurn(n);
  }
  const toggleBlock = (kind,i) => setG(s=>{
    if(s.mode!=="block") return s;
    const key = kind==="h"?"blockH":"blockG";
    const arr = s[key].includes(i)?s[key].filter(x=>x!==i):[...s[key],i];
    return {...s,[key]:arr};
  });
  const takeIt = () => setG(s=>{
    if(s.mode!=="block") return s;
    const dh = s.blockH.reduce((a,i)=>a+(s.hand[i].def||0),0);
    const dg = s.blockG.reduce((a,i)=>a+(s.gear[i].def||0),0);
    const through = Math.max(0, s.incoming-dh-dg);
    let n = {...s, myHP:s.myHP-through,
      hand:s.hand.filter((_,i)=>!s.blockH.includes(i)),
      grave:[...s.blockH.map(i=>s.hand[i]),...s.grave],
      gear:s.gear.map((gr,i)=>s.blockG.includes(i)?{...gr,used:true}:gr),
      blockH:[],blockG:[]};
    n = L(n, `Blocked ${dh+dg}, took ${through}.`);
    if(n.myHP<=0){ n.over={win:false}; return L(n,"You hit the boards. The dummy remains undefeated."); }
    return newTurn(n);
  });
  function newTurn(s){
    return L({...s, turn:s.turn+1, ap:1, weaponUsed:{}, mode:"act"}, `— Turn ${s.turn+1}. Action point refreshed.`);
  }
  uE(()=>{ if(g.over&&g.over.win) onRecord(h.k, g.over.score); },[g.over]);

  const weapons = g.gear.filter(isWeapon);
  const blockGear = g.gear.map((gr,i)=>({gr,i})).filter(({gr})=>gr.def>0);
  return (
    <div className="board">
      <button className="tag" onClick={onExit}>← leave the hall</button>
      <div className="dummy clip">
        <div><div className="hp">{Math.max(0,g.dHP)}</div><div className="lbl">Training dummy</div></div>
        <div className="incoming">turn {g.turn}<br/>{g.mode==="block"?`INCOMING ${g.incoming}`:`next swing ${[3,4,5][(g.turn-1)%3]+(g.turn>6?1:0)}`}</div>
      </div>
      <div className="mystat">
        <span className="pill hp">LIFE <b>{g.myHP}</b></span>
        <span className="pill">RES <b>{g.res}</b></span>
        <span className="pill">AP <b>{g.ap}</b></span>
        <span className="pill">DECK <b>{g.deck.length}</b></span>
        <span className="pill">WASTED <b>{g.wasted}</b></span>
        <button className={"pill"+(g.inspect?" hp":"")} onClick={()=>setG(s=>({...s,inspect:!s.inspect}))}>ℹ {g.inspect?"inspecting":"inspect"}</button>
      </div>
      <div className="log">{g.log.map((l,i)=><div key={i} className={i?"dim":""}>{l}</div>)}</div>

      {g.mode==="pay" && (()=>{const sel=g.paySel.reduce((a,i)=>a+(g.hand[i].pitch||0),0); const need=Math.max(0,(g.pending.card.cost||0)-g.res-sel); return <div className="paymode clip-sm">Paying for <b>{g.pending.card.name}</b> (cost {g.pending.card.cost}) — tap hand cards to pitch. Selected <b>{sel}</b>{need>0?<span>, need <b>{need}</b> more.</span>:<span> — covered. Hit pitch & play.</span>}</div>;})()}
      {g.mode==="block" && <div className="blockmode clip-sm">Blocking <b>{g.incoming}</b> — tap hand cards (blue shield) and unused equipment. Anything unblocked hits your life.</div>}
      {g.mode==="arsenal" && <div className="paymode clip-sm">End of turn — tap one card to set into <b>arsenal</b> (arrows must live here), or <button className="retry" onClick={skipArsenal}>skip</button>.</div>}

      <div className="zone">Weapons & equipment {g.mode==="block"?"(tap shields to block — once per game)":""}</div>
      <div className="gearrow">
        {g.gear.map((gr,i)=>{
          const w = isWeapon(gr), blockable = g.mode==="block" && gr.def>0 && !gr.used;
          const sel = g.blockG.includes(i);
          return (
            <button key={gr.uid} className={"g clip-sm"+(gr.used?" used":"")+(sel?" sel":"")}
              style={sel?{borderColor:"var(--b)",boxShadow:"0 0 0 1px var(--b)"}:null}
              onClick={()=> g.mode==="block" ? (blockable&&toggleBlock("g",i)) : (g.inspect?setZoom(gr): w&&tryPlay(gr,"weapon",i))}>
              <CardImg card={gr}/>
              {gr.def>0 && <span className="gd">{gr.def}</span>}
            </button>);
        })}
      </div>

      <div className="arsenalrow">
        <div className="slot clip-sm">{g.arsenal
          ? <button style={{padding:0}} onClick={()=> g.inspect?setZoom(g.arsenal):tryPlay(g.arsenal,"arsenal",0)}><CardImg card={g.arsenal}/></button>
          : "arsenal empty"}</div>
        <div style={{flex:1}}>
          <div className="zone">Hand — tap to play · pitch value rides the card art</div>
          <div className="hand">
            {g.hand.map((c,i)=>{
              const sel = g.mode==="pay" ? g.paySel.includes(i) : g.mode==="block" ? g.blockH.includes(i) : false;
              const dim = g.mode==="block" && !(c.def>0) && !sel;
              return (
                <button key={c.uid} className={"hc clip-sm"+(sel?" sel":"")+(dim?" dis":"")}
                  onClick={()=> g.mode==="block" ? (c.def>0&&toggleBlock("h",i)) : g.mode==="arsenal" ? pickArsenal(i) : tryPlay(c,"hand",i)}>
                  <CardImg card={c}/>
                  {c.cost!=null && <span className="cost">{c.cost}</span>}
                  {c.power!=null && <span className="pw">{c.power}</span>}
                  {c.def!=null && c.def>0 && <span className="df">{c.def}</span>}
                </button>);
            })}
          </div>
        </div>
      </div>

      <div className="actrow">
        {g.mode==="pay" ? <>
          <button className="a" onClick={cancelPay}>Cancel</button>
          <button className="a pay" onClick={confirmPay}>Pitch & play</button>
        </> : g.mode==="block" ? (
          <button className="a go" onClick={takeIt}>Take it</button>
        ) : (
          <button className="a go" disabled={g.mode!=="act"||!!g.over} onClick={endTurn}>End turn</button>
        )}
      </div>

      {g.over && (g.over.win
        ? <WinPanel score={g.over.score} onExit={onExit}/>
        : <div className="lose clip"><h3 className="disp">Down — but wiser</h3><p style={{fontSize:13}}>Fewer wasted pitches and tighter blocks next run.</p>
            <button className="bigbtn alt" onClick={onExit}>Back to heroes</button></div>)}
      <CardModal card={zoom} onClose={()=>setZoom(null)}/>
      <p className="note">Frame engine: real costs, pitch, power, defense, go again, arrows-from-arsenal, once-per-game equipment blocks. Printed card abilities beyond these numbers are shown (ℹ) but not yet executed.</p>
    </div>
  );
}
function WinPanel({score,onExit}){
  const [t] = uS(()=>{
    let pool=[]; TROPHIES.forEach(x=>{for(let i=0;i<x.w;i++)pool.push(x);});
    return pool[Math.floor(Math.random()*pool.length)];
  });
  uE(()=>{ const seen = store.get("case",[]); store.set("case",[...seen,{n:t.n,r:t.r,at:Date.now()}]); },[]);
  return (
    <div className="reveal" onClick={onExit}>
      <h2 className="disp" style={{marginBottom:14}}>DUMMY DESTROYED</h2>
      <div className="card clip"><div className="rar">{t.r} pull</div><h3>{t.n}</h3></div>
      <p style={{marginTop:14,fontSize:13}}>Efficiency score <b className="mono">{score}</b> — lower is cleaner. Tap anywhere.</p>
    </div>
  );
}

/* ---------- JUDGE ---------- */
function Judge(){
  const [i,setI]=uS(0),[pick,setPick]=uS(null),[right,setRight]=uS(0);
  const q = JUDGE_QS[i%JUDGE_QS.length];
  const done = i>=JUDGE_QS.length;
  if(done) return (
    <div className="sheet clip"><h2>Bench cleared</h2>
      <p style={{margin:"8px 0"}}>{right} / {JUDGE_QS.length} correct. Rules and pitch discipline win Silver Age games.</p>
      <button className="bigbtn alt" onClick={()=>{setI(0);setPick(null);setRight(0);}}>Run it again</button>
      <p className="note">Rules per the official Comprehensive Rules — always confirm current bans and errata at fabtcg.com before an event.</p>
    </div>);
  return (
    <div className="sheet clip">
      <div className="tag">Judge call {i+1} / {JUDGE_QS.length}</div>
      <h2 style={{fontSize:18,textTransform:"none",fontFamily:"'Spline Sans'",fontWeight:600,letterSpacing:0,margin:"6px 0"}}>{q.q}</h2>
      {q.a.map((a,ai)=>(
        <button key={ai} className={"qopt clip-sm"+(pick==null?"":ai===q.c?" right":ai===pick?" wrong":"")}
          onClick={()=>{ if(pick==null){ setPick(ai); if(ai===q.c) setRight(r=>r+1);} }}>{a}</button>
      ))}
      {pick!=null && <><div className="explain">{q.x}</div>
        <button className="bigbtn" onClick={()=>{setI(i+1);setPick(null);}}>Next ruling</button></>}
    </div>
  );
}

/* ---------- TROPHIES ---------- */
function Trophies(){
  const pulls = store.get("case",[]);
  const best = store.get("best",{});
  const count = {}; pulls.forEach(p=>{count[p.n]=(count[p.n]||0)+1;});
  return (
    <div>
      <div className="sheet clip">
        <h2>Trophy case</h2>
        <p className="tag" style={{margin:"4px 0 10px"}}>Cosmetic pulls from dummy kills — no gambling, no wallet</p>
        {Object.keys(count).length===0 && <p style={{fontSize:13.5}}>Empty shelves. Destroy a dummy to hang your first trophy.</p>}
        {TROPHIES.filter(t=>count[t.n]).map(t=>(
          <div key={t.n} className="statrow" style={{justifyContent:"space-between"}}>
            <span>{t.n} <span className="tag">{t.r}</span></span><b>×{count[t.n]}</b>
          </div>))}
      </div>
      <div className="sheet clip" style={{marginTop:10}}>
        <h2 style={{fontSize:20}}>Best clears</h2>
        {Object.keys(best).length===0 ? <p style={{fontSize:13.5}}>No clears logged yet.</p> :
          HEROES.filter(h=>best[h.k]!=null).map(h=>(
            <div key={h.k} className="statrow" style={{justifyContent:"space-between"}}>
              <span>{h.n}</span><b className="mono">{best[h.k]}</b>
            </div>))}
      </div>
    </div>
  );
}

/* ---------- APP ---------- */
function App(){
  const [db,reload] = useCardDB();
  const [tab,setTab]=uS("heroes");
  const [hero,setHero]=uS(null);
  const [fighting,setFighting]=uS(null);
  const [best,setBest]=uS(()=>store.get("best",{}));
  const record=(k,score)=>setBest(b=>{
    const nb={...b,[k]: b[k]==null?score:Math.min(b[k],score)}; store.set("best",nb); return nb;
  });
  return (
    <div className="shell">
      <div className="topbar">
        <span className="brand">DAWN<em>BLADE</em></span>
        <span className="tag">Silver Age training hall</span>
      </div>
      <DbBanner db={db} reload={reload}/>
      {tab==="heroes" && !fighting && (hero
        ? <HeroSheet h={hero} db={db} best={best} onBack={()=>setHero(null)} onFight={h=>setFighting(h)}/>
        : <HeroGrid best={best} onPick={setHero}/>)}
      {fighting && <Battle h={fighting} db={db} onExit={()=>setFighting(null)} onRecord={record}/>}
      {tab==="judge" && !fighting && <Judge/>}
      {tab==="trophies" && !fighting && <Trophies/>}
      {!fighting && <nav className="tabs">
        <button className={"tab"+(tab==="heroes"?" on":"")} onClick={()=>{setTab("heroes");}}>Heroes</button>
        <button className={"tab"+(tab==="judge"?" on":"")} onClick={()=>setTab("judge")}>Judge</button>
        <button className={"tab"+(tab==="trophies"?" on":"")} onClick={()=>setTab("trophies")}>Trophies</button>
      </nav>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
setTimeout(function(){ if(!window.React || !document.querySelector(".shell")) document.getElementById("cdnfail").style.display="block"; },4000);
</script>
